<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pasar Pagi</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <header class="header">
    <div class="brand">
      <p class="eyebrow">buah segar / pagi yang tenang</p>
      <h1>Pasar Pagi</h1>
    </div>

    <div class="cart-summary">
      <span class="cart-label">keranjang</span>
      <div class="cart-pill">
        <i class="fas fa-shopping-basket"></i>
        <span id="cart-count">0</span>
      </div>
    </div>
  </header>

  <main class="store-layout">
    <section class="products-area">
      <div class="market-note">
        <p>
          Jam pasar yang tenang. Buah musiman ditata pelan-pelan, dengan
          keterikatan emosional yang patut dipertanyakan.
        </p>
      </div>

      <section id="product-section" class="product-section"></section>
    </section>

    <aside class="cart-sidebar">
      <div class="cart-header">
        <h2>Keranjang Kamu</h2>
        <p>barang pilihan yang kebanyakan</p>
      </div>

      <div id="cart-details" class="cart-details"></div>

      <div class="cart-footer">
        <label class="field-label" for="note">Catatan buat petani</label>
        <textarea id="note" class="note-input" placeholder="mis. titip di depan pintu biru ya :)"></textarea>

        <div class="coupon-row">
          <input id="coupon" class="coupon-input" placeholder="kode kupon">
          <button id="apply-coupon" class="coupon-btn">Pakai</button>
        </div>
        <div id="coupon-msg" class="coupon-msg"></div>

        <div class="cart-breakdown" id="cart-summary-breakdown"></div>

        <button id="checkout-button" class="checkout-button">
          Lanjut ke Pembayaran
        </button>
      </div>
    </aside>
  </main>

  <div class="modal-overlay" id="review-modal">
    <div class="modal-card">
      <h3>Cek Pesanan Kamu</h3>
      <p class="modal-sub">Lihat sekali lagi sebelum dikirim ke petani.</p>
      <div id="review-items"></div>
      <div id="review-note-wrap"></div>
      <div class="review-breakdown" id="review-breakdown"></div>
      <div class="modal-actions">
        <button class="btn-back" id="review-back">Kembali</button>
        <button class="btn-confirm" id="review-confirm">Konfirmasi Pesanan</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!--
    VERSI LATIHAN BUG BOUNTY: logika di bawah sengaja memuat temuan pada
    LAPORAN-TEMUAN.md. Hanya untuk dianalisis secara lokal, jangan dipakai produksi.
  -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const products = [
        { id: 1, name: "Apel Fuji", price: 1.5, stock: 12, produceId: "#4131", image: "https://res.cloudinary.com/dgwef8ttm/image/upload/v1736589286/25-01-11-03-50-09-954_deco_m2ofbh.jpg" },
        { id: 2, name: "Jeruk Navel", price: 2, stock: 9, produceId: "#4012", image: "https://res.cloudinary.com/dgwef8ttm/image/upload/v1736591406/25-01-11-04-29-12-930_deco_r9gznn.jpg" },
        { id: 3, name: "Pisang", price: 1.2, stock: 20, produceId: "#4011", image: "https://res.cloudinary.com/dgwef8ttm/image/upload/v1736591160/25-01-11-04-24-17-097_deco_htwecb.jpg" },
        { id: 4, name: "Anggur", price: 3.5, stock: 6, produceId: "#4022", image: "https://res.cloudinary.com/dgwef8ttm/image/upload/v1736589285/25-01-11-03-50-38-513_deco_spywdb.jpg" },
        { id: 5, name: "Stroberi", price: 4.5, stock: 8, produceId: "#4252", image: "https://res.cloudinary.com/dgwef8ttm/image/upload/v1736614071/25-01-11-10-44-32-511_deco_doxshi.jpg" }
      ];
      const HANDLING_FEE = 0.30;
      const KUPON_RAHASIA = "TEMANFARMER";
      let diskon = 0;
      let cart = {};

      const productSection = document.getElementById("product-section");
      const cartDetails = document.getElementById("cart-details");
      const cartCount = document.getElementById("cart-count");
      const breakdown = document.getElementById("cart-summary-breakdown");
      const modal = document.getElementById("review-modal");

      function renderProducts() {
        productSection.innerHTML = "";
        products.forEach((product) => {
          const quantity = cart[product.id] ? cart[product.id].count : 0;
          const sisa = Math.floor(Math.random() * 5) + 1;
          const card = document.createElement("article");
          card.className = "product";
          card.innerHTML = `
            <p class="produce-id">${product.produceId}</p>
            <img src="${product.image}" alt="${product.name}" class="product-image">
            <div class="item-meta"><h2>${product.name}</h2><p class="price">$${product.price.toFixed(2)}</p></div>
            <p class="stock">tinggal ${sisa} lagi hari ini!</p>
            <div class="quantity-controls">
              <button class="quantity-button minus-button" data-id="${product.id}">−</button>
              <span class="quantity-display">${quantity}</span>
              <button class="quantity-button plus-button" data-id="${product.id}" data-price="${product.price}">+</button>
            </div>`;
          productSection.appendChild(card);
        });
      }

      function updateCartCount() {
        cartCount.textContent = Object.values(cart).reduce((sum, item) => sum + item.count, 0);
      }

      function renderCart() {
        cartDetails.innerHTML = "";
        let subtotal = 0;
        if (Object.keys(cart).length === 0) {
          cartDetails.innerHTML = '<p class="empty-cart">Keranjang kamu masih kosong.</p>';
          breakdown.innerHTML = "";
          updateCartCount();
          renderProducts();
          return;
        }
        Object.values(cart).forEach((item) => {
          const itemTotal = item.count * item.price;
          subtotal += itemTotal;
          const row = document.createElement("div");
          row.className = "cart-item";
          row.innerHTML = `
            <div class="cart-item-top"><div><div class="cart-item-name">${item.name}</div><div class="cart-item-price">$${item.price.toFixed(2)} / buah</div></div><strong>$${itemTotal.toFixed(2)}</strong></div>
            <div class="cart-item-controls"><input type="number" min="1" class="edit-quantity-input" value="${item.count}" data-id="${item.id}"><i class="fas fa-trash delete-icon" data-id="${item.id}"></i></div>`;
          cartDetails.appendChild(row);
        });
        const note = document.getElementById("note").value;
        if (note) {
          const preview = document.createElement("div");
          preview.className = "note-preview";
          preview.innerHTML = "Catatan: " + note;
          cartDetails.appendChild(preview);
        }
        const total = (subtotal + HANDLING_FEE) * (1 - diskon);
        breakdown.innerHTML = `<div class="row grand"><span>Total</span><span>$${total}</span></div>`;
        updateCartCount();
        renderProducts();
      }

      function addToCart(id, price) {
        const product = products.find((item) => item.id == id);
        if (!product) return;
        if (!cart[id]) cart[id] = { ...product, count: 0 };
        cart[id].price = price;
        cart[id].count++;
        renderCart();
      }
      function removeFromCart(id) {
        if (!cart[id]) return;
        cart[id].count--;
        if (cart[id].count <= 0) delete cart[id];
        renderCart();
      }
      function updateQuantity(id, quantity) {
        if (!cart[id]) return;
        if (quantity <= 0) delete cart[id];
        else cart[id].count = quantity;
        renderCart();
      }
      function applyCoupon() {
        const message = document.getElementById("coupon-msg");
        if (document.getElementById("coupon").value.trim() === KUPON_RAHASIA) {
          diskon = 0.9; message.textContent = "Kupon aktif! Potongan 90%.";
        } else { diskon = 0; message.textContent = "Kode kupon salah."; }
        renderCart();
      }
      function openReview() {
        if (!Object.keys(cart).length) return;
        const items = document.getElementById("review-items");
        items.innerHTML = "";
        let subtotal = 0;
        Object.values(cart).forEach((item) => {
          const line = item.count * item.price; subtotal += line;
          items.innerHTML += `<div class="review-line"><span>${item.name} x ${item.count}</span><span>$${line.toFixed(2)}</span></div>`;
        });
        const note = document.getElementById("note").value;
        document.getElementById("review-note-wrap").textContent = note ? "Catatan: " + note : "";
        const total = (subtotal + HANDLING_FEE) * (1 - diskon);
        document.getElementById("review-breakdown").innerHTML = `<div class="row"><span>Subtotal</span><span>$${subtotal.toFixed(2)}</span></div><div class="row"><span>Biaya penanganan</span><span>$${HANDLING_FEE.toFixed(2)}</span></div><div class="row grand"><span>Total</span><span>$${total}</span></div>`;
        modal.classList.add("open");
      }
      document.addEventListener("click", (event) => {
        const target = event.target;
        if (target.classList.contains("plus-button")) addToCart(target.dataset.id, Number(target.dataset.price));
        if (target.classList.contains("minus-button")) removeFromCart(target.dataset.id);
        if (target.classList.contains("delete-icon")) { delete cart[target.dataset.id]; renderCart(); }
        if (target.id === "apply-coupon") applyCoupon();
        if (target.id === "checkout-button") openReview();
        if (target.id === "review-back" || target === modal) modal.classList.remove("open");
        if (target.id === "review-confirm") { cart = {}; diskon = 0; modal.classList.remove("open"); renderCart(); }
      });
      document.addEventListener("input", (event) => {
        if (event.target.classList.contains("edit-quantity-input")) updateQuantity(event.target.dataset.id, parseInt(event.target.value, 10));
        if (event.target.id === "note") renderCart();
      });
      renderProducts();
      renderCart();
    });
  </script>
</body>
</html>
