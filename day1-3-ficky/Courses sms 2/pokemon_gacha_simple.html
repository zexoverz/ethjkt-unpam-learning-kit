
<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pokemon Gacha Simple</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #17202a;
    }

    main {
      max-width: 850px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
    }

    .controls,
    .status,
    .card {
      background: white;
      border: 1px solid #d8dee8;
      border-radius: 8px;
      padding: 14px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin: 18px 0;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 12px 16px;
      background: #e3350d;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #b72a0b;
    }

    .status {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .stat {
      border: 1px solid #d8dee8;
      border-radius: 8px;
      padding: 10px;
    }

    .stat span {
      display: block;
      color: #667085;
      font-size: 12px;
      margin-bottom: 6px;
    }

    #results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }

    .card {
      min-height: 220px;
    }

    .tier {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      color: white;
      background: #2b8a57;
      font-size: 12px;
      font-weight: 800;
    }

    .SSR .tier {
      background: #d99a00;
    }

    .SR .tier {
      background: #2f6fd6;
    }

    img {
      width: 100%;
      height: 130px;
      object-fit: contain;
      margin: 8px 0;
    }

    .image-fallback {
      width: 100%;
      height: 130px;
      display: grid;
      place-items: center;
      margin: 8px 0;
      color: #667085;
      background: #f4f6f8;
      border-radius: 8px;
      font-size: 13px;
    }

    .name {
      margin: 0;
      font-weight: 800;
    }

    .types {
      margin: 4px 0 0;
      color: #667085;
      font-size: 13px;
    }

    @media (max-width: 650px) {
      .status {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Pokemon Gacha</h1>
    <p>Versi simpel. Data dan gambar diambil dari PokeAPI.</p>

    <div class="controls">
      <button onclick="pull(1)">Single Pull</button>
      <button onclick="pull(10)">Ten Pull</button>
      <button onclick="resetGame()">Reset</button>
    </div>

    <section class="status">
      <div class="stat"><span>Total Pull</span><strong id="total">0</strong></div>
      <div class="stat"><span>Pity SSR</span><strong id="ssrPity">0/90</strong></div>
      <div class="stat"><span>Pity SR</span><strong id="srPity">0/10</strong></div>
      <div class="stat"><span>Rate SSR</span><strong id="ssrRate">0.60%</strong></div>
    </section>

    <section id="results"></section>
  </main>

  <script>
    const pools = {
      SSR: [150, 151, 249, 384],
      SR: [6, 9, 94, 149],
      R: [1, 4, 7, 25, 39, 52, 54, 133]
    };

    let total = 0;
    let ssrPity = 0;
    let srPity = 0;
    const cache = {};

    function currentSsrRate() {
      if (ssrPity < 75) return 0.006;
      return Math.min(1, 0.006 + (ssrPity - 74) * 0.06);
    }

    function pickTier() {
      total++;
      ssrPity++;
      srPity++;

      let tier = "R";
      if (ssrPity >= 90 || Math.random() < currentSsrRate()) {
        tier = "SSR";
        ssrPity = 0;
        srPity = 0;
      } else if (srPity >= 10 || Math.random() < 0.094) {
        tier = "SR";
        srPity = 0;
      }

      return tier;
    }

    function randomItem(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function titleCase(text) {
      return text.split("-").map(word => word[0].toUpperCase() + word.slice(1)).join(" ");
    }

    function pokeImageUrls(id, data) {
      return [
        `https://cdn.jsdelivr.net/gh/PokeAPI/sprites@master/sprites/pokemon/other/official-artwork/${id}.png`,
        `https://cdn.jsdelivr.net/gh/PokeAPI/sprites@master/sprites/pokemon/${id}.png`,
        data.sprites.other["official-artwork"].front_default,
        data.sprites.front_default,
        `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`,
        `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`
      ].filter(Boolean);
    }

    function loadImage(url) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(url);
        image.onerror = reject;
        image.src = url;
      });
    }

    async function firstWorkingImage(urls) {
      for (const url of urls) {
        try {
          return await loadImage(url);
        } catch {
          continue;
        }
      }

      return "";
    }

    async function getPokemon(id) {
      if (cache[id]) return cache[id];

      const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
      const data = await response.json();
      const images = pokeImageUrls(id, data);
      const pokemon = {
        name: titleCase(data.name),
        types: data.types.map(slot => slot.type.name),
        image: await firstWorkingImage(images)
      };

      cache[id] = pokemon;
      return pokemon;
    }

    async function pull(amount) {
      const results = document.getElementById("results");
      results.innerHTML = "";

      for (let i = 0; i < amount; i++) {
        const tier = pickTier();
        const pokemon = await getPokemon(randomItem(pools[tier]));
        results.appendChild(createCard(tier, pokemon));
      }

      updateStatus();
    }

    function createCard(tier, pokemon) {
      const card = document.createElement("article");
      card.className = `card ${tier}`;

      const tierBadge = document.createElement("span");
      tierBadge.className = "tier";
      tierBadge.textContent = tier;

      let media = document.createElement("img");
      media.alt = pokemon.name;
      if (pokemon.image) {
        media.src = pokemon.image;
      } else {
        media = document.createElement("div");
        media.className = "image-fallback";
        media.textContent = "Gambar tidak tersedia";
      }

      const name = document.createElement("p");
      name.className = "name";
      name.textContent = pokemon.name;

      const types = document.createElement("p");
      types.className = "types";
      types.textContent = pokemon.types.join(" / ");

      card.append(tierBadge, media, name, types);
      return card;
    }

    function updateStatus() {
      document.getElementById("total").textContent = total;
      document.getElementById("ssrPity").textContent = `${ssrPity}/90`;
      document.getElementById("srPity").textContent = `${srPity}/10`;
      document.getElementById("ssrRate").textContent = `${(currentSsrRate() * 100).toFixed(2)}%`;
    }

    function resetGame() {
      total = 0;
      ssrPity = 0;
      srPity = 0;
      document.getElementById("results").innerHTML = "";
      updateStatus();
    }
  </script>
</body>
</html>
