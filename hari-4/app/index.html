<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KampusSwap</title>
    <link rel="icon" href="/ethjkt-logo.png" />

    <!-- Font: Plus Jakarta Sans (brand ETHJKT) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- SVG lens filter buat efek "liquid glass" -->
    <svg xmlns="http://www.w3.org/2000/svg" style="position: absolute; width: 0; height: 0">
      <filter id="lensFilter" x="0%" y="0%" width="100%" height="100%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="40" result="blur" />
        <feDisplacementMap in="SourceGraphic" in2="blur" scale="40"
          xChannelSelector="A" yChannelSelector="A" />
      </filter>
    </svg>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
