<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yu-Gi-Oh! Card Gacha</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="app">
    <header class="top">
      <div>
        <div class="eyebrow">Duel draw simulator</div>
        <h1>YU-GI-OH! CARD GACHA</h1>
        <p class="subtitle">tarik kartu dari database YGOPRODeck</p>
      </div>
      <p class="status" id="status">Memuat kartu dari API...</p>
    </header>

    <section class="stats" aria-label="Statistik gacha">
      <article class="stat"><div class="num" id="total">0</div><div class="lbl">Total Tarik</div></article>
      <article class="stat"><div class="num" id="ssrCount">0</div><div class="lbl">SSR Didapat</div></article>
      <article class="stat"><div class="num" id="collectionCount">0</div><div class="lbl">Koleksi Unik</div></article>
      <article class="stat"><div class="num" id="poolCount">0</div><div class="lbl">Kartu API</div></article>
    </section>

    <section class="pity" aria-label="Progress pity SSR">
      <div class="pity-top"><span>Pity ke SSR gratis</span><span id="pityText">0 / 1000</span></div>
      <div class="pity-track"><div class="pity-fill" id="pityFill"></div></div>
    </section>

    <section class="board" aria-label="Area gacha utama">
      <div class="stage">
        <article class="card" id="card">
          <img class="card-art" id="cardImage" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" alt="Yu-Gi-Oh! card artwork">
          <div class="card-info">
            <div class="name" id="cardName">Memuat kartu...</div>
            <div class="rar" id="cardRarity"></div>
            <div class="owned-note" id="ownedNote"></div>
            <div class="meta" id="cardMeta"></div>
            <p class="desc" id="cardDesc"></p>
          </div>
        </article>
      </div>

      <div class="actions">
        <button class="btn" id="tarik1" disabled>TARIK 1x</button>
        <button class="btn gold" id="tarik10" disabled>TARIK 10x</button>
        <button class="btn secondary" id="badgeToggle" type="button">BADGES 0 / 0</button>
      </div>
    </section>

    <section class="panel history-panel" id="historyPreview" aria-label="Riwayat gacha terakhir">
      <div class="panel-head">
        <div class="hist-lbl">Riwayat Terakhir 4 Kartu</div>
        <button class="btn secondary close-btn" id="historyToggle" type="button">LIHAT SEMUA</button>
      </div>
      <div class="history" id="history"></div>
    </section>
  </main>

  <aside class="modal" id="historyPanel" aria-hidden="true" role="dialog" aria-label="Semua riwayat gacha">
    <div class="floating-panel">
      <div class="panel-head">
        <div class="hist-lbl">Semua Riwayat Gacha</div>
        <button class="btn secondary close-btn" data-close="historyPanel" type="button">TUTUP</button>
      </div>
      <div class="modal-history" id="fullHistory"></div>
    </div>
  </aside>

  <aside class="modal" id="badgePanel" aria-hidden="true" role="dialog" aria-label="Badge koleksi">
    <div class="floating-panel">
      <div class="panel-head">
        <div>
          <div class="hist-lbl">Badge Koleksi</div>
          <div class="hist-lbl" id="badgeCount">0 / 0</div>
        </div>
        <button class="btn secondary close-btn" data-close="badgePanel" type="button">TUTUP</button>
      </div>
      <div class="badges" id="badgeList"></div>
    </div>
  </aside>

<script src="js/app.js"></script>
</body>
</html>
