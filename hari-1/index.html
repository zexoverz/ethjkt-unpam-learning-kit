<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gacha ETHJKT</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, "Segoe UI", system-ui, sans-serif;
    background:
      linear-gradient(90deg, rgba(38, 38, 38, .035) 1px, transparent 1px),
      linear-gradient(rgba(38, 38, 38, .035) 1px, transparent 1px),
      #f3f0e8;
    background-size: 28px 28px;
    color: #24221f;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 28px;
  }
  .app {
    width: 100%; max-width: 860px;
    background: #fffdf8;
    border: 1px solid #d6d0c3;
    border-radius: 6px;
    padding: 22px;
    box-shadow: 0 18px 44px rgba(43, 36, 27, .16);
  }
  .topbar {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 18px; padding-bottom: 18px; margin-bottom: 20px;
    border-bottom: 1px solid #ded7ca;
  }
  h1 {
    font-size: 30px; line-height: 1; margin-bottom: 7px;
    color: #20201e; font-weight: 850;
  }
  .subtitle { font-size: 13px; color: #6a6258; max-width: 340px; }
  .tag {
    border: 1px solid #262626; border-radius: 999px;
    padding: 7px 11px; font-size: 11px; font-weight: 800;
    text-transform: uppercase; letter-spacing: .08em;
    white-space: nowrap; background: #eef3f0;
  }
  .layout {
    display: grid; grid-template-columns: minmax(270px, 330px) 1fr;
    gap: 22px; align-items: start;
  }
  .stage { display: flex; justify-content: center; margin-bottom: 14px; }
  .card {
    width: 100%; max-width: 310px; aspect-ratio: 3 / 4; border-radius: 6px;
    background: #f8f3e9; border: 2px solid #cfc6b8;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 0; position: relative; overflow: hidden;
  }
  .card::before {
    content: ""; position: absolute; inset: 10px;
    border: 1px solid rgba(36, 34, 31, .16);
    pointer-events: none; z-index: 1;
  }
  .card .photo {
    width: 100%; flex: 1; min-height: 0; background: #e8dfd0;
    display: flex; align-items: center; justify-content: center;
  }
  .card img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card .name {
    width: 100%; min-height: 42px; display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 850; padding: 0 14px; color: #222; background: #fffdf8;
    border-top: 1px solid #d8d0c2; text-align: center;
  }
  .card .rar {
    font-size: 11px; font-weight: 850; letter-spacing: .11em; text-transform: uppercase;
    opacity: .9; padding: 0 0 12px; background: #fffdf8; width: 100%; text-align: center;
  }
  .status {
    min-height: 18px; margin-bottom: 16px;
    color: #6d655b; font-size: 12px; text-align: center;
  }
  .api-url { display: none; }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat {
    background: #f7f3ea; border: 1px solid #e1d9ca; border-radius: 6px;
    padding: 12px 10px; text-align: left;
  }
  .stat .num { font-size: 25px; line-height: 1; font-weight: 850; }
  .stat .lbl {
    margin-top: 5px; font-size: 10px; color: #756d62;
    text-transform: uppercase; letter-spacing: .08em;
  }
  .pity { margin-bottom: 18px; text-align: left; }
  .pity-top { display: flex; justify-content: space-between; font-size: 12px; color: #625b54; margin-bottom: 6px; }
  .pity-track { height: 9px; background: #ece3d6; border-radius: 999px; overflow: hidden; }
  .pity-fill {
    height: 100%; width: 0%;
    background: #d74b3f;
    transition: width 0.35s ease;
  }
  .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .btn {
    min-height: 48px; padding: 0 14px; border: 1px solid #1f1f1f; border-radius: 6px;
    font-size: 14px; font-weight: 850; letter-spacing: 0; cursor: pointer;
    color: #fff; background: #1f1f1f;
    transition: transform .08s ease, filter .15s ease;
  }
  .btn:hover { filter: brightness(1.08); }
  .btn:active { transform: scale(.95); }
  .btn:disabled { opacity: .55; }
  .btn.gold { background: #d74b3f; border-color: #d74b3f; }
  .panel { border-left: 1px solid #ded7ca; padding-left: 22px; }
  .note {
    background: #eef3f0; border: 1px solid #cfdbd3; border-radius: 6px;
    padding: 13px 14px; margin-bottom: 14px; color: #3b4a40; font-size: 13px;
  }
  .hist-lbl {
    font-size: 11px; color: #7b746c; text-transform: uppercase;
    letter-spacing: .08em; text-align: left; margin-bottom: 8px;
  }
  .history { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; min-height: 94px; }
  .chip {
    aspect-ratio: 1; border-radius: 6px; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background: #f8f3e9; border: 2px solid #d9d0c1;
  }
  .chip img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .card.common { border-color: #948e84; }
  .card.common .rar { color: #6f6a64; }
  .card.rare, .chip.rare { border-color: #2e7092; }
  .card.rare .rar { color: #235e7d; }
  .card.epic, .chip.epic { border-color: #7f5a9b; }
  .card.epic .rar { color: #6e478b; }
  .card.ssr, .chip.ssr { border-color: #d74b3f; }
  .card.ssr { box-shadow: 0 10px 26px rgba(183, 63, 51, .2); }
  .card.ssr .rar, .card.ssr .name { color: #b8362d; }

  @keyframes pop { 0% { transform: scale(.72); opacity: 0; } 70% { transform: scale(1.03); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  @keyframes glowpulse { 0%,100%{box-shadow:0 10px 26px rgba(183,63,51,.2)} 50%{box-shadow:0 12px 34px rgba(183,63,51,.38)} }
  .card.reveal { animation: pop .34s ease; }
  .card.ssr.reveal { animation: pop .34s ease, shake .45s ease .34s, glowpulse 1.1s ease-in-out .34s 2; }

  @media (max-width: 720px) {
    body { padding: 14px; align-items: flex-start; }
    .app { padding: 18px; }
    .topbar { align-items: flex-start; flex-direction: column; gap: 12px; }
    h1 { font-size: 27px; }
    .layout { grid-template-columns: 1fr; }
    .panel { border-left: 0; padding-left: 0; border-top: 1px solid #ded7ca; padding-top: 18px; }
    .card { max-width: 290px; }
    .history { grid-template-columns: repeat(6, minmax(38px, 1fr)); }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div>
        <h1>Gacha ETHJKT</h1>
        <div class="subtitle">Tarik karakter, simpan hasil terakhir, dan kejar pity SSR tiap 10 tarikan.</div>
      </div>
      <div class="tag">Hari 1 Demo</div>
    </div>

    <div class="layout">
      <main>
        <div class="stage">
          <div class="card" id="card">
            <div class="photo"><img id="cardImage" alt="Hasil gacha karakter"></div>
            <div class="name" id="cardName">Belum ada hasil</div>
            <div class="rar" id="cardRarity"></div>
          </div>
        </div>
        <div class="status" id="statusText">Siap mulai. Ambil 1 atau 10 tarikan.</div>
      </main>

      <section class="panel">
        <div class="stats">
          <div class="stat"><div class="num" id="total">0</div><div class="lbl">Total Tarik</div></div>
          <div class="stat"><div class="num" id="ssrCount">0</div><div class="lbl">SSR Didapat</div></div>
        </div>

        <div class="pity">
          <div class="pity-top"><span>Pity SSR</span><span id="pityText">0 / 10</span></div>
          <div class="pity-track"><div class="pity-fill" id="pityFill"></div></div>
        </div>

        <div class="buttons">
          <button class="btn" id="tarik1">Tarik 1x</button>
          <button class="btn gold" id="tarik10">Tarik 10x</button>
        </div>

        <div class="note">SSR dijamin saat pity menyentuh 10. Riwayat menampilkan 12 hasil terakhir.</div>

        <div class="hist-lbl">Riwayat Terakhir</div>
        <div class="history" id="history"></div>
      </section>
    </div>
  </div>

<script>
  const namaWaifu = {
    ssr: ["Aurora", "Celestia", "Hikari", "Miyuki"],
    epic: ["Akari", "Yuna", "Sakura", "Reina"],
    rare: ["Nana", "Aoi", "Rika", "Mei"],
    common: ["Mika", "Sora", "Hana", "Rin"]
  };

  let pity = 0;
  let total = 0;
  let ssrCount = 0;
  let sedangMenarik = false;

  const card = document.getElementById("card");
  const cardImage = document.getElementById("cardImage");
  const cardName = document.getElementById("cardName");
  const cardRarity = document.getElementById("cardRarity");
  const statusText = document.getElementById("statusText");
  const totalEl = document.getElementById("total");
  const ssrCountEl = document.getElementById("ssrCount");
  const pityText = document.getElementById("pityText");
  const pityFill = document.getElementById("pityFill");
  const historyEl = document.getElementById("history");
  const tarik1 = document.getElementById("tarik1");
  const tarik10 = document.getElementById("tarik10");

  function buatSvgData(teks) {
    const svg = `
      <svg xmlns="http://www.w3.org/2000/svg" width="460" height="620" viewBox="0 0 460 620">
        <rect width="460" height="620" fill="#f8f3e9"/>
        <rect x="52" y="48" width="356" height="462" rx="10" fill="#efe5d6" stroke="#cfc6b8" stroke-width="4"/>
        <path d="M90 126h280M90 478h280" stroke="#24221f" stroke-opacity=".18" stroke-width="3"/>
        <circle cx="230" cy="270" r="74" fill="#fffdf8" stroke="#cfc6b8" stroke-width="4"/>
        <path d="M191 280c20-42 58-42 78 0M190 316h80" stroke="#756d62" stroke-width="12" stroke-linecap="round" fill="none"/>
        <text x="230" y="558" font-size="28" text-anchor="middle" fill="#625b54" font-family="Arial" font-weight="700">${teks}</text>
      </svg>`;

    return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
  }

  const gambarFallback = buatSvgData("Mulai tarik");

  cardImage.src = gambarFallback;
  cardImage.onerror = () => {
    if (cardImage.src !== gambarFallback) {
      cardImage.src = gambarFallback;
    }
  };

  function pilihAcak(arr) {
    const index = Math.floor(Math.random() * arr.length);
    return arr[index];
  }

  async function ambilGambarWaifu() {
    const response = await fetch("https://api.waifu.im/images");

    if (!response.ok) {
      throw new Error("Gagal mengambil gambar waifu");
    }

    const data = await response.json();
    const url = data.url
      || data.images?.[0]?.url
      || data.items?.[0]?.url
      || data[0]?.url
      || data.images?.[0]?.image?.url;

    if (!url) {
      throw new Error("Response API tidak berisi URL gambar");
    }

    return url;
  }

  async function rollSatu() {
    const gambar = await ambilGambarWaifu();

    total += 1;
    pity += 1;

    const acak = Math.random();
    let kelas = "common";

    if (pity >= 10 || acak < 0.03) {
      kelas = "ssr";
      pity = 0;
      ssrCount += 1;
    } else if (acak < 0.10) {
      kelas = "epic";
    } else if (acak < 0.30) {
      kelas = "rare";
    }

    return {
      kelas,
      nama: pilihAcak(namaWaifu[kelas]),
      gambar
    };
  }

  function tampilkan(hasil) {
    cardImage.src = hasil.gambar;
    cardImage.alt = `${hasil.nama} - ${hasil.kelas.toUpperCase()}`;
    cardName.textContent = hasil.nama;
    cardRarity.textContent = hasil.kelas.toUpperCase();
    statusText.innerHTML = `Dapat ${hasil.nama}. Sumber gambar aktif.<span class="api-url">${hasil.gambar}</span>`;

    card.className = "card";
    card.offsetWidth;
    card.className = `card ${hasil.kelas} reveal`;

    totalEl.textContent = total;
    ssrCountEl.textContent = ssrCount;
    pityText.textContent = `${pity} / 10`;
    pityFill.style.width = `${(pity / 10) * 100}%`;
  }

  function tambahRiwayat(hasil) {
    const chip = document.createElement("div");
    chip.className = `chip ${hasil.kelas}`;
    chip.title = `${hasil.nama} (${hasil.kelas.toUpperCase()})`;

    const img = document.createElement("img");
    img.src = hasil.gambar;
    img.alt = hasil.nama;
    chip.appendChild(img);

    historyEl.prepend(chip);

    while (historyEl.children.length > 12) {
      historyEl.lastElementChild.remove();
    }
  }

  function setTombolAktif(aktif) {
    sedangMenarik = !aktif;
    tarik1.disabled = !aktif;
    tarik10.disabled = !aktif;
    tarik1.style.cursor = aktif ? "pointer" : "wait";
    tarik10.style.cursor = aktif ? "pointer" : "wait";
  }

  async function tarikSekali() {
    if (sedangMenarik) return;

    setTombolAktif(false);
    cardName.textContent = "Mengambil hasil...";

    try {
      const hasil = await rollSatu();
      tampilkan(hasil);
      tambahRiwayat(hasil);
    } catch (error) {
      cardName.textContent = "Gagal memuat";
      cardRarity.textContent = "";
      statusText.textContent = `Gagal mengambil data dari https://api.waifu.im/images. Detail: ${error.message}`;
    }

    setTombolAktif(true);
  }

  async function tarikSepuluh() {
    if (sedangMenarik) return;

    setTombolAktif(false);

    for (let i = 0; i < 10; i += 1) {
      cardName.textContent = "Mengambil hasil...";
      try {
        const hasil = await rollSatu();
        tampilkan(hasil);
        tambahRiwayat(hasil);
      } catch (error) {
        cardName.textContent = "Gagal memuat";
        cardRarity.textContent = "";
        statusText.textContent = `Tarikan dihentikan karena API waifu.im gagal. Detail: ${error.message}`;
        break;
      }

      await new Promise((resolve) => setTimeout(resolve, 180));
    }

    setTombolAktif(true);
  }

  tarik1.addEventListener("click", tarikSekali);
  tarik10.addEventListener("click", tarikSepuluh);
</script>
</body>
</html>
