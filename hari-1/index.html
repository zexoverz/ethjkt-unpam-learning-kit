<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flower Gacha</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #243024;
    --muted: #6d756c;
    --line: #d9e5d7;
    --paper: #fffdf8;
    --leaf: #2f7d4f;
    --rose: #d84d78;
    --gold: #d99a18;
    --sky: #4c8fc7;
  }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background:
      radial-gradient(circle at 12% 10%, rgba(255, 206, 128, .55), transparent 28%),
      radial-gradient(circle at 88% 20%, rgba(135, 202, 169, .65), transparent 26%),
      linear-gradient(145deg, #f7fbef 0%, #edf6f5 50%, #fff4f5 100%);
    color: var(--ink);
    min-height: 100vh;
    padding: 20px;
  }
  .shell {
    width: 100%;
    max-width: 980px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr;
    gap: 18px;
  }
  .panel {
    background: rgba(255, 253, 248, .9);
    border: 1px solid rgba(47, 125, 79, .18);
    border-radius: 8px;
    box-shadow: 0 18px 45px rgba(63, 87, 66, .14);
  }
  .gacha {
    min-height: calc(100vh - 40px);
    padding: 24px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 20px;
  }
  .topline {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 14px;
  }
  h1 {
    font-size: clamp(30px, 6vw, 54px);
    line-height: .95;
    letter-spacing: 0;
    color: #1f5136;
  }
  .subtitle {
    margin-top: 8px;
    color: var(--muted);
    font-size: 15px;
    max-width: 520px;
  }
  .stats {
    min-width: 185px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .stat {
    background: #f7fbf3;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }
  .num { font-size: 25px; font-weight: 800; color: #214d34; }
  .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
  .stage {
    display: grid;
    grid-template-columns: minmax(240px, 330px) 1fr;
    gap: 20px;
    align-items: center;
  }
  .card {
    position: relative;
    aspect-ratio: 3 / 4;
    border-radius: 8px;
    border: 3px solid #9baa99;
    background:
      radial-gradient(circle at 50% 24%, rgba(255,255,255,.95) 0 16%, transparent 17%),
      linear-gradient(180deg, #f8faf0, #e6efe7);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute;
    inset: 12px;
    border: 1px solid rgba(36, 48, 36, .14);
    border-radius: 6px;
    pointer-events: none;
  }
  .flower {
    width: 138px;
    height: 138px;
    position: relative;
    margin-bottom: 18px;
    filter: drop-shadow(0 12px 18px rgba(49, 76, 52, .18));
  }
  .petal {
    position: absolute;
    width: 58px;
    height: 86px;
    left: 40px;
    top: 18px;
    background: var(--petal, #e56b8b);
    border-radius: 58px 58px 16px 16px;
    transform-origin: 50% 52px;
    opacity: .96;
  }
  .petal:nth-child(1) { transform: rotate(0deg) translateY(-27px); }
  .petal:nth-child(2) { transform: rotate(60deg) translateY(-27px); }
  .petal:nth-child(3) { transform: rotate(120deg) translateY(-27px); }
  .petal:nth-child(4) { transform: rotate(180deg) translateY(-27px); }
  .petal:nth-child(5) { transform: rotate(240deg) translateY(-27px); }
  .petal:nth-child(6) { transform: rotate(300deg) translateY(-27px); }
  .core {
    position: absolute;
    width: 46px;
    height: 46px;
    left: 46px;
    top: 46px;
    border-radius: 50%;
    background: #f7c948;
    border: 5px solid rgba(87, 63, 26, .16);
  }
  .stem {
    position: absolute;
    width: 12px;
    height: 70px;
    left: 63px;
    top: 92px;
    border-radius: 10px;
    background: #3f8f59;
    z-index: -1;
  }
  .leaf {
    position: absolute;
    width: 52px;
    height: 28px;
    top: 118px;
    border-radius: 100% 0 100% 0;
    background: #4b9f66;
  }
  .leaf.left { left: 22px; transform: rotate(-25deg); }
  .leaf.right { right: 22px; transform: rotate(25deg) scaleX(-1); }
  .name { font-size: 24px; font-weight: 800; text-align: center; padding: 0 16px; }
  .rar {
    margin-top: 6px;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .card.common { border-color: #9baa99; }
  .card.rare { border-color: var(--sky); box-shadow: 0 0 0 5px rgba(76, 143, 199, .12); }
  .card.epic { border-color: var(--rose); box-shadow: 0 0 0 5px rgba(216, 77, 120, .13); }
  .card.ssr { border-color: var(--gold); box-shadow: 0 20px 70px rgba(217, 154, 24, .32), 0 0 0 6px rgba(217, 154, 24, .16); }
  .card.rare .rar { color: var(--sky); }
  .card.epic .rar { color: var(--rose); }
  .card.ssr .rar, .card.ssr .name { color: #94640c; }
  @keyframes pop { 0% { transform: scale(.76) rotate(-2deg); opacity: 0; } 65% { transform: scale(1.04); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes bloom { 0% { transform: scale(.65); } 100% { transform: scale(1); } }
  .card.reveal { animation: pop .38s ease; }
  .card.reveal .flower { animation: bloom .42s ease; }
  .controls { display: grid; gap: 14px; }
  .pity-top {
    display: flex;
    justify-content: space-between;
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 7px;
  }
  .pity-track {
    height: 11px;
    background: #e6eee4;
    border-radius: 999px;
    overflow: hidden;
  }
  .pity-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #65ad78, #e0a72b);
    transition: width .25s ease;
  }
  .buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  button, .file-label {
    border: 0;
    border-radius: 8px;
    min-height: 48px;
    padding: 0 14px;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    color: #fff;
    background: var(--leaf);
    transition: transform .08s ease, filter .16s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  button:hover, .file-label:hover { filter: brightness(1.05); }
  button:active, .file-label:active { transform: scale(.97); }
  button.gold { background: var(--gold); color: #281d08; }
  button:disabled { cursor: not-allowed; opacity: .58; }
  .history {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    min-height: 42px;
  }
  .chip {
    width: 54px;
    height: 54px;
    border-radius: 8px;
    border: 2px solid var(--line);
    background: #fbfff8;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .chip-flower {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--petal, #e56b8b);
    box-shadow: 0 -11px 0 var(--petal, #e56b8b), 11px 0 0 var(--petal, #e56b8b), 0 11px 0 var(--petal, #e56b8b), -11px 0 0 var(--petal, #e56b8b);
  }
  .chip.rare { border-color: var(--sky); }
  .chip.epic { border-color: var(--rose); }
  .chip.ssr { border-color: var(--gold); box-shadow: 0 0 16px rgba(217, 154, 24, .36); }
  .collection {
    display: grid;
    gap: 10px;
  }
  .collection-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .section-title {
    font-size: 12px;
    font-weight: 800;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .collection-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(118px, 1fr));
    gap: 10px;
  }
  .result-card {
    min-height: 118px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: #fbfff8;
    padding: 10px;
    display: grid;
    align-content: start;
    gap: 8px;
    text-align: left;
    color: var(--ink);
    cursor: pointer;
  }
  .result-card:hover {
    border-color: rgba(47, 125, 79, .35);
    transform: translateY(-1px);
  }
  .result-card .mini {
    width: 36px;
    height: 36px;
    margin: 0;
  }
  .result-name {
    font-size: 13px;
    font-weight: 800;
    line-height: 1.2;
  }
  .result-rarity {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .empty {
    color: var(--muted);
    font-size: 13px;
    padding: 10px 0 2px;
  }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(20, 31, 22, .52);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 18px;
    z-index: 50;
  }
  .overlay.open { display: flex; }
  .modal {
    width: min(92vw, 360px);
    background: #fffef9;
    border: 1px solid rgba(47, 125, 79, .18);
    border-radius: 10px;
    box-shadow: 0 26px 70px rgba(0, 0, 0, .28);
    padding: 18px;
    display: grid;
    gap: 12px;
  }
  .modal-top {
    display: flex;
    justify-content: space-between;
    align-items: start;
    gap: 12px;
  }
  .modal-close {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    border: 0;
    background: #eef4eb;
    color: var(--ink);
    font-size: 20px;
    cursor: pointer;
  }
  .modal-flower {
    width: 124px;
    height: 124px;
    margin: 4px auto 0;
  }
  .modal-desc {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.5;
    text-align: center;
  }
  @media (max-width: 820px) {
    body { padding: 12px; }
    .shell { grid-template-columns: 1fr; }
    .gacha { min-height: auto; }
    .topline, .stage { grid-template-columns: 1fr; display: grid; }
    .stats { width: 100%; }
    .card { max-width: 330px; width: 100%; margin: 0 auto; }
  }
</style>
</head>
<body>
  <main class="shell">
    <section class="panel gacha">
      <div class="topline">
        <div>
          <h1>Flower Gacha</h1>
          <p class="subtitle">Tarik bunga, kumpulkan hasilnya, lalu klik item untuk lihat detail popup.</p>
        </div>
        <div class="stats">
          <div class="stat"><div class="num" id="total">0</div><div class="lbl">Tarik</div></div>
          <div class="stat"><div class="num" id="ssrCount">0</div><div class="lbl">SSR</div></div>
        </div>
      </div>

      <div class="stage">
        <div class="card" id="card">
          <div class="flower" id="flowerArt">
            <span class="petal"></span><span class="petal"></span><span class="petal"></span>
            <span class="petal"></span><span class="petal"></span><span class="petal"></span>
            <span class="stem"></span><span class="leaf left"></span><span class="leaf right"></span><span class="core"></span>
          </div>
          <div class="name" id="cardName">Tekan Tarik</div>
          <div class="rar" id="cardRarity">Belum ada bunga</div>
        </div>

        <div class="controls">
          <div>
            <div class="pity-top"><span>Pity SSR</span><span id="pityText">0 / 10</span></div>
            <div class="pity-track"><div class="pity-fill" id="pityFill"></div></div>
          </div>
          <div class="buttons">
            <button id="tarik1">Tarik 1x</button>
            <button class="gold" id="tarik10">Tarik 10x</button>
          </div>
          <div>
            <div class="lbl" style="margin-bottom:8px;">Riwayat Terakhir</div>
            <div class="history" id="history"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-top">
        <div>
          <div class="section-title">Hasil Gacha</div>
          <div class="name" id="modalTitle">-</div>
          <div class="result-rarity" id="modalRarity">-</div>
        </div>
        <button class="modal-close" id="modalClose" aria-label="Tutup popup">×</button>
      </div>
      <div class="flower modal-flower" id="modalFlower">
        <span class="petal"></span><span class="petal"></span><span class="petal"></span>
        <span class="petal"></span><span class="petal"></span><span class="petal"></span>
        <span class="stem"></span><span class="leaf left"></span><span class="leaf right"></span><span class="core"></span>
      </div>
      <div class="modal-desc" id="modalDesc"></div>
    </div>
  </div>

<script>
  const hadiah = {
    ssr: [
      { n: "Rafflesia Arnoldii", c: "#b82f44" },
      { n: "Anggrek Bulan", c: "#f5eefb" },
      { n: "Edelweiss Jawa", c: "#f2d47c" }
    ],
    epic: [
      { n: "Tulip Merah", c: "#dd3d4f" },
      { n: "Lavender", c: "#8c6dd7" },
      { n: "Camellia", c: "#ff7f9f" },
      { n: "Lotus", c: "#f49ac2" }
    ],
    rare: [
      { n: "Mawar", c: "#e84d69" },
      { n: "Lily", c: "#f3f7ff" },
      { n: "Hibiscus", c: "#ff7043" },
      { n: "Dahlia", c: "#b857c9" }
    ],
    common: [
      { n: "Melati", c: "#ffffff" },
      { n: "Kenanga", c: "#ffd84d" },
      { n: "Kamboja", c: "#ffe0a8" },
      { n: "Bougenville", c: "#d946ef" },
      { n: "Bunga Matahari", c: "#f6b82d" }
    ]
  };

  let pity = Number(localStorage.getItem("flowerGachaPity") || 0);
  let total = Number(localStorage.getItem("flowerGachaTotal") || 0);
  let ssrCount = Number(localStorage.getItem("flowerGachaSSR") || 0);
  let collection = JSON.parse(localStorage.getItem("flowerGachaCollection") || "[]");

  const card = document.getElementById("card");
  const flowerArt = document.getElementById("flowerArt");
  const cardName = document.getElementById("cardName");
  const cardRarity = document.getElementById("cardRarity");
  const totalEl = document.getElementById("total");
  const ssrCountEl = document.getElementById("ssrCount");
  const pityText = document.getElementById("pityText");
  const pityFill = document.getElementById("pityFill");
  const historyEl = document.getElementById("history");
  const overlay = document.getElementById("overlay");
  const modalTitle = document.getElementById("modalTitle");
  const modalRarity = document.getElementById("modalRarity");
  const modalDesc = document.getElementById("modalDesc");
  const modalFlower = document.getElementById("modalFlower");
  const modalClose = document.getElementById("modalClose");

  function pilihAcak(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function rollSatu() {
    total += 1;
    pity += 1;
    const acak = Math.random();
    let kelas = "common";

    if (pity >= 10 || acak < 0.03) {
      kelas = "ssr";
      pity = 0;
      ssrCount += 1;
    } else if (acak < 0.10) {
      kelas = "epic";
    } else if (acak < 0.30) {
      kelas = "rare";
    }

    const item = pilihAcak(hadiah[kelas]);
    return { kelas, nama: item.n, warna: item.c };
  }

  function simpanStats() {
    localStorage.setItem("flowerGachaPity", String(pity));
    localStorage.setItem("flowerGachaTotal", String(total));
    localStorage.setItem("flowerGachaSSR", String(ssrCount));
    localStorage.setItem("flowerGachaCollection", JSON.stringify(collection));
  }

  function tampilkan(hasil) {
    flowerArt.style.setProperty("--petal", hasil.warna);
    cardName.textContent = hasil.nama;
    cardRarity.textContent = hasil.kelas.toUpperCase();

    card.className = "card";
    card.offsetWidth;
    card.className = `card ${hasil.kelas} reveal`;

    totalEl.textContent = total;
    ssrCountEl.textContent = ssrCount;
    pityText.textContent = `${pity} / 10`;
    pityFill.style.width = `${Math.min(pity, 10) * 10}%`;
    simpanStats();
  }

  function tambahRiwayat(hasil) {
    const id = `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    collection.unshift({ id, ...hasil, at: new Date().toISOString() });
    renderCollection();
    simpanStats();
  }

  function renderCollection() {
    historyEl.innerHTML = "";

    if (!collection.length) {
      historyEl.innerHTML = '<div class="empty">Belum ada hasil. Tarik dulu untuk mengisi koleksi.</div>';
      return;
    }

    collection.slice(0, 12).forEach((item) => {
      const chip = document.createElement("button");
      chip.type = "button";
      chip.className = `chip ${item.kelas}`;
      chip.title = `${item.nama} - ${item.kelas.toUpperCase()}`;
      chip.innerHTML = `<span class="chip-flower" style="--petal:${item.warna}"></span>`;
      chip.addEventListener("click", () => bukaPopup(item));
      historyEl.appendChild(chip);
    });
  }

  function bukaPopup(item) {
    modalTitle.textContent = item.nama;
    modalRarity.textContent = item.kelas.toUpperCase();
    modalDesc.textContent = `Item ini didapat dari gacha. Klik tombol tutup atau area gelap untuk kembali ke koleksi.`;
    modalFlower.style.setProperty("--petal", item.warna);
    modalFlower.className = `flower modal-flower ${item.kelas}`;
    overlay.classList.add("open");
    overlay.setAttribute("aria-hidden", "false");
  }

  function tutupPopup() {
    overlay.classList.remove("open");
    overlay.setAttribute("aria-hidden", "true");
  }

  function tambahRiwayatLama(hasil) {
    const chip = document.createElement("div");
    chip.className = `chip ${hasil.kelas}`;
    chip.title = `${hasil.nama} - ${hasil.kelas.toUpperCase()}`;
    chip.innerHTML = `<span class="chip-flower" style="--petal:${hasil.warna}"></span>`;
    historyEl.prepend(chip);
  }

  function tarik(jumlah) {
    let hasil;
    for (let i = 0; i < jumlah; i += 1) {
      hasil = rollSatu();
      tambahRiwayat(hasil);
    }
    tampilkan(hasil);
  }

  document.getElementById("tarik1").addEventListener("click", () => tarik(1));
  document.getElementById("tarik10").addEventListener("click", () => tarik(10));
  modalClose.addEventListener("click", tutupPopup);
  overlay.addEventListener("click", (event) => {
    if (event.target === overlay) tutupPopup();
  });
  window.addEventListener("keydown", (event) => {
    if (event.key === "Escape") tutupPopup();
  });

  renderCollection();
  tampilkan({ kelas: "common", nama: "Tekan Tarik", warna: "#e56b8b" });
</script>
</body>
</html>
