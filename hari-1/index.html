<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flower Gacha</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at 50% 0%, #1b2140 0%, #0a0d1c 70%);
    color: #eaeaf0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .app {
    width: 100%; max-width: 460px; text-align: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px; padding: 24px 22px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  h1 {
    font-size: 26px; letter-spacing: 1px; margin-bottom: 4px;
    background: linear-gradient(90deg,#ffd86b,#ff7eb3,#7ee8ff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .subtitle { font-size: 12px; color: #8b90b0; margin-bottom: 18px; }

  .stats { display: flex; gap: 10px; margin-bottom: 12px; }
  .stat {
    flex: 1; background: rgba(255,255,255,0.05); border-radius: 12px;
    padding: 10px 6px;
  }
  .stat .num { font-size: 22px; font-weight: 700; }
  .stat .lbl { font-size: 11px; color: #8b90b0; text-transform: uppercase; letter-spacing: 1px; }

  .pity { margin-bottom: 18px; text-align: left; }
  .pity-top { display: flex; justify-content: space-between; font-size: 12px; color: #b9bdd8; margin-bottom: 6px; }
  .pity-track { height: 10px; background: rgba(255,255,255,0.08); border-radius: 6px; overflow: hidden; }
  .pity-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg,#ffd86b,#ffb347);
    transition: width 0.35s ease;
  }

  .stage { display: flex; justify-content: center; margin-bottom: 20px; }
  .card {
    width: 180px; height: 230px; border-radius: 18px;
    background: #171b30; border: 3px solid #2a2f4a;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; position: relative;
  }
  .card .flower-img {
    width: 118px; height: 118px; border-radius: 16px;
    object-fit: cover; display: block;
    border: 1px solid rgba(255,255,255,.12);
    filter: drop-shadow(0 4px 10px rgba(0,0,0,.5));
  }
  .card .name { font-size: 17px; font-weight: 700; padding: 0 8px; }
  .card .rar { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; opacity: .9; }

  /* warna per rarity */
  .card.common { border-color: #6b7280; }
  .card.common .rar { color: #9aa3b2; }
  .card.rare { border-color: #4da6ff; box-shadow: 0 0 22px rgba(77,166,255,.45); }
  .card.rare .rar { color: #4da6ff; }
  .card.epic { border-color: #b06bff; box-shadow: 0 0 26px rgba(176,107,255,.55); }
  .card.epic .rar { color: #c88bff; }
  .card.legendary { border-color: #ffd24a; box-shadow: 0 0 34px rgba(255,210,74,.65); }
  .card.legendary .rar { color: #ffd24a; }
  .card.legendary .name { color: #ffe89a; }
  .card.mythic { border-color: #ff6bd6; box-shadow: 0 0 44px rgba(255,107,214,.8); }
  .card.mythic .rar { color: #ff8ee0; }
  .card.mythic .name { color: #ffc7ef; }

  /* animasi reveal */
  @keyframes pop { 0% { transform: scale(.5); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  @keyframes glowpulse { 0%,100%{box-shadow:0 0 30px rgba(255,210,74,.7)} 50%{box-shadow:0 0 55px rgba(255,210,74,1)} }
  .card.reveal { animation: pop .4s ease; }
  .card.legendary.reveal, .card.mythic.reveal { animation: pop .4s ease, shake .5s ease .4s, glowpulse 1.2s ease-in-out .4s 2; }

  .buttons { display: flex; gap: 12px; margin-bottom: 22px; }
  .btn {
    flex: 1; padding: 15px 0; border: none; border-radius: 14px;
    font-size: 16px; font-weight: 800; letter-spacing: 1px; cursor: pointer;
    color: #0a0d1c; background: linear-gradient(180deg,#8fd3ff,#4da6ff);
    transition: transform .08s ease, filter .15s ease;
  }
  .btn:hover { filter: brightness(1.08); }
  .btn:active { transform: scale(.95); }
  .btn.gold { background: linear-gradient(180deg,#ffe58a,#ffb347); }

  .hist-lbl { font-size: 11px; color: #8b90b0; text-transform: uppercase; letter-spacing: 1px; text-align: left; margin-bottom: 8px; }
  .history { display: flex; flex-wrap: wrap; gap: 6px; min-height: 34px; }
  .chip {
    width: 34px; height: 34px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    background: #171b30; border: 2px solid #2a2f4a;
    overflow: hidden;
  }
  .chip img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .chip.rare { border-color: #4da6ff; }
  .chip.epic { border-color: #b06bff; }
  .chip.legendary { border-color: #ffd24a; box-shadow: 0 0 10px rgba(255,210,74,.6); }
  .chip.mythic { border-color: #ff6bd6; box-shadow: 0 0 12px rgba(255,107,214,.7); }
</style>
</head>
<body>
  <div class="app">
    <h1>FLOWER GACHA</h1>
    <div class="subtitle">tarik bunga langka, simpan mekar terbaikmu</div>

    <div class="stats">
      <div class="stat"><div class="num" id="total">0</div><div class="lbl">Total Tarik</div></div>
      <div class="stat"><div class="num" id="mythicCount">0</div><div class="lbl">Mythic Didapat</div></div>
    </div>

    <div class="pity">
      <div class="pity-top"><span>Pity ke Mythic gratis</span><span id="pityText">0 / 20</span></div>
      <div class="pity-track"><div class="pity-fill" id="pityFill"></div></div>
    </div>

    <div class="stage">
      <div class="card" id="card">
        <img class="flower-img" id="cardImage" alt="" src="https://images.unsplash.com/photo-1490750967868-88aa4486c946?auto=format&fit=crop&w=360&h=360&q=80">
        <div class="name" id="cardName">Tekan TARIK</div>
        <div class="rar" id="cardRarity"></div>
      </div>
    </div>

    <div class="buttons">
      <button class="btn" id="tarik1">TARIK 1x</button>
      <button class="btn gold" id="tarik10">TARIK 10x</button>
    </div>

    <div class="hist-lbl">Riwayat Terakhir</div>
    <div class="history" id="history"></div>
  </div>

<script>
  const hadiah = {
    common: [
      { n: "Daisy Putih", img: "https://images.unsplash.com/photo-1520763185298-1b434c919102?auto=format&fit=crop&w=360&h=360&q=80" },
      { n: "Sunflower Cerah", img: "https://images.unsplash.com/photo-1490750967868-88aa4486c946?auto=format&fit=crop&w=360&h=360&q=80" },
      { n: "Lavender Lembut", img: "https://images.unsplash.com/photo-1477511801984-4ad318ed9846?auto=format&fit=crop&w=360&h=360&q=80" }
    ],
    rare: [
      { n: "Tulip Merah", img: "https://images.unsplash.com/photo-1496062031456-07b8f162a322?auto=format&fit=crop&w=360&h=360&q=80" },
      { n: "Rose Blush", img: "https://images.unsplash.com/photo-1518895949257-7621c3c786d7?auto=format&fit=crop&w=360&h=360&q=80" },
      { n: "Cherry Blossom", img: "https://images.unsplash.com/photo-1522383225653-ed111181a951?auto=format&fit=crop&w=360&h=360&q=80" }
    ],
    epic: [
      { n: "Lotus Senja", img: "https://images.unsplash.com/photo-1457089328109-e5d9bd499191?auto=format&fit=crop&w=360&h=360&q=80" },
      { n: "Peony Mewah", img: "https://images.unsplash.com/photo-1508610048659-a06b669e3321?auto=format&fit=crop&w=360&h=360&q=80" },
      { n: "Poppy Scarlet", img: "https://images.unsplash.com/photo-1436891436013-5965265af5fc?auto=format&fit=crop&w=360&h=360&q=80" }
    ],
    legendary: [
      { n: "Orchid Emas", img: "https://images.unsplash.com/photo-1566907225472-7f1537bb8b6b?auto=format&fit=crop&w=360&h=360&q=80" },
      { n: "Dahlia Aurora", img: "https://images.unsplash.com/photo-1561181286-d3fee7d55364?auto=format&fit=crop&w=360&h=360&q=80" }
    ],
    mythic: [
      { n: "Moonlit Magnolia", img: "https://images.unsplash.com/photo-1525310072745-f49212b5ac6d?auto=format&fit=crop&w=360&h=360&q=80" },
      { n: "Celestial Bloom", img: "https://images.unsplash.com/photo-1508808703020-ef18109db02f?auto=format&fit=crop&w=360&h=360&q=80" }
    ]
  };

  const batasPity = 20;
  let pity = 0;
  let total = 0;
  let mythicCount = 0;

  const totalEl = document.getElementById("total");
  const mythicCountEl = document.getElementById("mythicCount");
  const pityTextEl = document.getElementById("pityText");
  const pityFillEl = document.getElementById("pityFill");
  const cardEl = document.getElementById("card");
  const cardImageEl = document.getElementById("cardImage");
  const cardNameEl = document.getElementById("cardName");
  const cardRarityEl = document.getElementById("cardRarity");
  const historyEl = document.getElementById("history");
  const tarik1Btn = document.getElementById("tarik1");
  const tarik10Btn = document.getElementById("tarik10");

  function pilihAcak(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }


  function rollSatu() {
    total += 1;
    pity += 1;

    const acak = Math.random();
    let kelas;

    if (pity >= batasPity || acak < 0.01) {
      kelas = "mythic";
      pity = 0;
      mythicCount += 1;
    } else if (acak < 0.04) {
      kelas = "legendary";
    } else if (acak < 0.12) {
      kelas = "epic";
    } else if (acak < 0.32) {
      kelas = "rare";
    } else {
      kelas = "common";
    }

    const item = pilihAcak(hadiah[kelas]);
    return { kelas, nama: item.n, img: item.img };
  }

  function tampilkan(hasil) {
    cardImageEl.src = hasil.img;
    cardImageEl.alt = hasil.nama;
    cardNameEl.textContent = hasil.nama;
    cardRarityEl.textContent = hasil.kelas.toUpperCase();

    cardEl.className = "card";
    cardEl.offsetWidth;
    cardEl.className = `card ${hasil.kelas} reveal`;

    totalEl.textContent = total;
    mythicCountEl.textContent = mythicCount;
    pityTextEl.textContent = `${pity} / ${batasPity}`;
    pityFillEl.style.width = `${(pity / batasPity) * 100}%`;
  }

  function tambahRiwayat(hasil) {
    const chip = document.createElement("div");
    const img = document.createElement("img");

    chip.className = `chip ${hasil.kelas}`;
    chip.title = `${hasil.kelas.toUpperCase()} - ${hasil.nama}`;
    img.src = hasil.img;
    img.alt = hasil.nama;

    chip.appendChild(img);
    historyEl.prepend(chip);

    while (historyEl.children.length > 12) {
      historyEl.lastElementChild.remove();
    }
  }

  function tarik(jumlah) {
    let hasilTerakhir;

    for (let i = 0; i < jumlah; i += 1) {
      hasilTerakhir = rollSatu();
      tambahRiwayat(hasilTerakhir);
    }

    tampilkan(hasilTerakhir);
  }

  tarik1Btn.addEventListener("click", function () {
    tarik(1);
  });

  tarik10Btn.addEventListener("click", function () {
    tarik(10);
  });
</script>
</body>
</html>
