<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokemon Gacha</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at 50% 0%, #203451 0%, #0c111d 70%);
    color: #eaeaf0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .app {
    width: 100%; max-width: 460px; text-align: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px; padding: 24px 22px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  h1 {
    font-size: 26px; letter-spacing: 1px; margin-bottom: 4px;
    background: linear-gradient(90deg,#ffe066,#ff6b6b,#74c0fc);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .subtitle { font-size: 12px; color: #9ba4c0; margin-bottom: 18px; }

  .stats { display: flex; gap: 10px; margin-bottom: 12px; }
  .stat {
    flex: 1; background: rgba(255,255,255,0.05); border-radius: 12px;
    padding: 10px 6px;
  }
  .stat .num { font-size: 22px; font-weight: 700; }
  .stat .lbl { font-size: 11px; color: #9ba4c0; text-transform: uppercase; letter-spacing: 1px; }

  .pity { margin-bottom: 18px; text-align: left; }
  .pity-top { display: flex; justify-content: space-between; font-size: 12px; color: #c4c9de; margin-bottom: 6px; }
  .pity-track { height: 10px; background: rgba(255,255,255,0.08); border-radius: 6px; overflow: hidden; }
  .pity-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg,#ffe066,#ff922b);
    transition: width 0.35s ease;
  }

  .stage { display: flex; justify-content: center; margin-bottom: 20px; }
  .card {
    width: 180px; height: 230px; border-radius: 18px;
    background: #171d2c; border: 3px solid #30384f;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; position: relative;
  }
  .pokemon-art {
    width: 112px; height: 112px; object-fit: contain;
    filter: drop-shadow(0 8px 14px rgba(0,0,0,.45));
  }
  .pokemon-art.hidden { display: none; }
  .pokemon-fallback {
    width: 112px; height: 112px; border-radius: 50%;
    display: none; align-items: center; justify-content: center;
    background: rgba(255,255,255,.08); color: #eaeaf0;
    font-size: 38px; font-weight: 800;
  }
  .pokemon-fallback.show { display: flex; }
  .card .name { font-size: 17px; font-weight: 700; padding: 0 8px; }
  .card .rar { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; opacity: .9; }

  .card.common { border-color: #7c8799; }
  .card.common .rar { color: #aab4c3; }
  .card.rare   { border-color: #4dabf7; box-shadow: 0 0 22px rgba(77,171,247,.45); }
  .card.rare   .rar { color: #74c0fc; }
  .card.epic   { border-color: #da77f2; box-shadow: 0 0 26px rgba(218,119,242,.55); }
  .card.epic   .rar { color: #e599f7; }
  .card.ssr    { border-color: #ffd43b; box-shadow: 0 0 40px rgba(255,212,59,.8); }
  .card.ssr    .rar { color: #ffd43b; }
  .card.ssr    .name { color: #ffec99; }

  @keyframes pop { 0% { transform: scale(.5); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  @keyframes glowpulse { 0%,100%{box-shadow:0 0 30px rgba(255,212,59,.7)} 50%{box-shadow:0 0 55px rgba(255,212,59,1)} }
  .card.reveal { animation: pop .4s ease; }
  .card.ssr.reveal { animation: pop .4s ease, shake .5s ease .4s, glowpulse 1.2s ease-in-out .4s 2; }

  .result {
    min-height: 42px; margin: -6px 0 16px; color: #cbd0ec;
    font-size: 13px; line-height: 1.45;
  }
  .result strong { color: #ffd43b; }

  .buttons { display: flex; gap: 12px; margin-bottom: 22px; }
  .btn {
    flex: 1; padding: 15px 0; border: none; border-radius: 14px;
    font-size: 16px; font-weight: 800; letter-spacing: 1px; cursor: pointer;
    color: #0c111d; background: linear-gradient(180deg,#91d5ff,#4dabf7);
    transition: transform .08s ease, filter .15s ease;
  }
  .btn:hover { filter: brightness(1.08); }
  .btn:active { transform: scale(.95); }
  .btn:disabled { cursor: wait; filter: grayscale(.3) brightness(.8); }
  .btn.gold { background: linear-gradient(180deg,#fff3bf,#ff922b); }

  .hist-lbl { font-size: 11px; color: #9ba4c0; text-transform: uppercase; letter-spacing: 1px; text-align: left; margin-bottom: 8px; }
  .history { display: flex; flex-wrap: wrap; gap: 6px; min-height: 34px; }
  .chip {
    width: 34px; height: 34px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    background: #171d2c; border: 2px solid #30384f;
    overflow: hidden; color: #eaeaf0; font-size: 12px; font-weight: 800;
  }
  .chip img { width: 30px; height: 30px; object-fit: contain; }
  .chip.rare { border-color: #4dabf7; }
  .chip.epic { border-color: #da77f2; }
  .chip.ssr  { border-color: #ffd43b; box-shadow: 0 0 10px rgba(255,212,59,.6); }
</style>
</head>
<body>
  <div class="app">
    <h1>POKEMON GACHA</h1>
    <div class="subtitle">tarik Pokemon acak dari PokeAPI</div>

    <div class="stats">
      <div class="stat"><div class="num" id="total">0</div><div class="lbl">Total Pull</div></div>
      <div class="stat"><div class="num" id="ssrCount">0</div><div class="lbl">SSR Didapat</div></div>
    </div>

    <div class="pity">
      <div class="pity-top"><span>Pity ke SSR gratis</span><span id="pityText">0 / 10</span></div>
      <div class="pity-track"><div class="pity-fill" id="pityFill"></div></div>
    </div>

    <div class="stage">
      <div class="card" id="card">
        <img class="pokemon-art hidden" id="cardImage" alt="">
        <div class="pokemon-fallback show" id="cardFallback">?</div>
        <div class="name" id="cardName">Tekan TARIK</div>
        <div class="rar" id="cardRarity"></div>
      </div>
    </div>

    <div class="result" id="resultText">Hasil pull akan muncul di sini.</div>

    <div class="buttons">
      <button class="btn" id="tarik1">TARIK 1x</button>
      <button class="btn gold" id="tarik10">TARIK 10x</button>
    </div>

    <div class="hist-lbl">Riwayat Terakhir</div>
    <div class="history" id="history"></div>
  </div>

<script>
  const POKEAPI_URL = "https://pokeapi.co/api/v2/pokemon/";
  const JUMLAH_POKEMON = 1025;
  const BATAS_PITY = 10;
  const MAKS_RIWAYAT = 12;

  let pity = 0;
  let total = 0;
  let ssrCount = 0;

  const elemen = {
    card: document.getElementById("card"),
    image: document.getElementById("cardImage"),
    fallback: document.getElementById("cardFallback"),
    nama: document.getElementById("cardName"),
    rarity: document.getElementById("cardRarity"),
    total: document.getElementById("total"),
    ssrCount: document.getElementById("ssrCount"),
    pityText: document.getElementById("pityText"),
    pityFill: document.getElementById("pityFill"),
    resultText: document.getElementById("resultText"),
    history: document.getElementById("history"),
    tarik1: document.getElementById("tarik1"),
    tarik10: document.getElementById("tarik10")
  };

  function angkaAcak(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function formatNama(nama) {
    return nama
      .split("-")
      .map((kata) => kata.charAt(0).toUpperCase() + kata.slice(1))
      .join(" ");
  }

  function pilihRarity() {
    total += 1;
    pity += 1;

    const angka = Math.random();
    let rarity = "common";

    // Pity membuat SSR pasti keluar setelah 10 pull tanpa SSR.
    if (pity >= BATAS_PITY || angka < 0.03) {
      rarity = "ssr";
      pity = 0;
      ssrCount += 1;
    } else if (angka < 0.10) {
      rarity = "epic";
    } else if (angka < 0.30) {
      rarity = "rare";
    }

    return rarity;
  }

  function ambilSprite(pokemon) {
    const sprites = pokemon.sprites || {};
    const other = sprites.other || {};

    // PokeAPI tidak selalu punya semua gambar. Coba beberapa sumber.
    return [
      other["official-artwork"]?.front_default,
      other.home?.front_default,
      sprites.front_default,
      other.dream_world?.front_default
    ].filter(Boolean);
  }

  async function ambilPokemonAcak() {
    const id = angkaAcak(1, JUMLAH_POKEMON);
    const response = await fetch(`${POKEAPI_URL}${id}`);

    if (!response.ok) {
      throw new Error(`PokeAPI error: ${response.status}`);
    }

    const pokemon = await response.json();
    return {
      id: pokemon.id,
      nama: formatNama(pokemon.name),
      tipe: pokemon.types.map((item) => item.type.name).join(" / "),
      sprites: ambilSprite(pokemon)
    };
  }

  async function rollSatu() {
    const kelas = pilihRarity();
    const pokemon = await ambilPokemonAcak();

    return {
      kelas,
      nama: pokemon.nama,
      tipe: pokemon.tipe,
      sprites: pokemon.sprites,
      fallback: pokemon.nama.slice(0, 2).toUpperCase(),
      nomor: pokemon.id
    };
  }

  function pasangGambar(img, fallback, hasil) {
    let indexSprite = 0;

    function tampilkanFallback() {
      img.classList.add("hidden");
      fallback.classList.add("show");
      fallback.textContent = hasil.fallback;
    }

    function cobaSpriteBerikutnya() {
      if (indexSprite >= hasil.sprites.length) {
        tampilkanFallback();
        return;
      }

      img.classList.remove("hidden");
      fallback.classList.remove("show");
      img.src = hasil.sprites[indexSprite];
      indexSprite += 1;
    }

    img.alt = hasil.nama;
    img.onerror = cobaSpriteBerikutnya;
    img.onload = () => {
      fallback.classList.remove("show");
      img.classList.remove("hidden");
    };
    cobaSpriteBerikutnya();
  }

  function tampilkan(hasil) {
    elemen.nama.textContent = hasil.nama;
    elemen.rarity.textContent = `${hasil.kelas.toUpperCase()} #${hasil.nomor}`;
    pasangGambar(elemen.image, elemen.fallback, hasil);

    // Reset class sebentar supaya animasi reveal jalan setiap pull.
    elemen.card.className = "card";
    elemen.card.offsetWidth;
    elemen.card.className = `card ${hasil.kelas} reveal`;

    elemen.total.textContent = total;
    elemen.ssrCount.textContent = ssrCount;
    elemen.pityText.textContent = `${pity} / ${BATAS_PITY}`;
    elemen.pityFill.style.width = `${(pity / BATAS_PITY) * 100}%`;
  }

  function tambahRiwayat(hasil) {
    const chip = document.createElement("div");
    chip.className = `chip ${hasil.kelas}`;
    chip.title = `${hasil.nama} (${hasil.kelas.toUpperCase()})`;

    if (hasil.sprites.length > 0) {
      const img = document.createElement("img");
      img.src = hasil.sprites[hasil.sprites.length - 1];
      img.alt = hasil.nama;
      img.onerror = () => {
        chip.textContent = hasil.fallback;
      };
      chip.appendChild(img);
    } else {
      chip.textContent = hasil.fallback;
    }

    elemen.history.prepend(chip);

    while (elemen.history.children.length > MAKS_RIWAYAT) {
      elemen.history.lastElementChild.remove();
    }
  }

  function ringkasHasil(hasilTarikan) {
    const jumlahSSR = hasilTarikan.filter((hasil) => hasil.kelas === "ssr").length;
    const terakhir = hasilTarikan[hasilTarikan.length - 1];

    if (hasilTarikan.length === 1) {
      elemen.resultText.innerHTML = `Kamu dapat <strong>${terakhir.nama}</strong> (${terakhir.kelas.toUpperCase()}, ${terakhir.tipe}).`;
      return;
    }

    elemen.resultText.innerHTML = `Pull 10x selesai. SSR didapat: <strong>${jumlahSSR}</strong>. Pokemon terakhir: ${terakhir.nama}.`;
  }

  function setLoading(sedangLoading) {
    elemen.tarik1.disabled = sedangLoading;
    elemen.tarik10.disabled = sedangLoading;
    elemen.tarik1.textContent = sedangLoading ? "LOADING..." : "TARIK 1x";
    elemen.tarik10.textContent = sedangLoading ? "LOADING..." : "TARIK 10x";
  }

  async function tarik(jumlah) {
    const hasilTarikan = [];
    setLoading(true);
    elemen.resultText.textContent = "Mengambil Pokemon dari PokeAPI...";

    try {
      for (let i = 0; i < jumlah; i += 1) {
        const hasil = await rollSatu();
        hasilTarikan.push(hasil);
        tambahRiwayat(hasil);
      }

      tampilkan(hasilTarikan[hasilTarikan.length - 1]);
      ringkasHasil(hasilTarikan);
    } catch (error) {
      elemen.resultText.textContent = "Gagal mengambil data Pokemon. Cek koneksi internet, lalu coba lagi.";
      console.error(error);
    } finally {
      setLoading(false);
    }
  }

  elemen.tarik1.addEventListener("click", () => tarik(1));
  elemen.tarik10.addEventListener("click", () => tarik(10));
</script>
</body>
</html>
