<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokemon Gacha Simulator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at 50% 0%, #1b2140 0%, #0a0d1c 70%);
    color: #eaeaf0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .app {
    width: 100%; max-width: 520px; text-align: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px; padding: 24px 22px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  h1 {
    font-size: 26px; letter-spacing: 1px; margin-bottom: 4px;
    background: linear-gradient(90deg,#ffd86b,#ff7eb3,#7ee8ff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .subtitle { font-size: 12px; color: #8b90b0; margin-bottom: 18px; }

  .stats { display: flex; gap: 10px; margin-bottom: 12px; }
  .stat {
    flex: 1; background: rgba(255,255,255,0.05); border-radius: 12px;
    padding: 10px 6px;
  }
  .stat .num { font-size: 22px; font-weight: 700; }
  .stat .lbl { font-size: 11px; color: #8b90b0; text-transform: uppercase; letter-spacing: 1px; }

  .pity { margin-bottom: 18px; text-align: left; }
  .pity-top { display: flex; justify-content: space-between; font-size: 12px; color: #b9bdd8; margin-bottom: 6px; }
  .pity-track { height: 10px; background: rgba(255,255,255,0.08); border-radius: 6px; overflow: hidden; }
  .pity-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg,#ffd86b,#ffb347);
    transition: width 0.35s ease;
  }

  .stage { display: flex; justify-content: center; margin-bottom: 20px; }
  .card {
    width: 220px; min-height: 300px; border-radius: 18px;
    background: #171b30; border: 3px solid #2a2f4a;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; position: relative; padding: 14px;
  }
  .card .emoji { font-size: 74px; line-height: 1; filter: drop-shadow(0 4px 10px rgba(0,0,0,.5)); }
  .card .sprite {
    width: 150px; height: 150px; object-fit: contain;
    filter: drop-shadow(0 12px 18px rgba(0,0,0,.45));
  }
  .card .name { font-size: 17px; font-weight: 700; padding: 0 8px; }
  .card .rar { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; opacity: .9; }
  .types { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; min-height: 24px; }
  .type {
    font-size: 11px; font-weight: 800; text-transform: uppercase;
    background: rgba(255,255,255,.1); border-radius: 999px; padding: 5px 8px;
  }
  .meta {
    min-height: 34px; font-size: 12px; line-height: 1.35;
    color: #b9bdd8; padding: 0 4px;
  }

  /* warna per rarity */
  .card.common { border-color: #6b7280; }
  .card.common .rar { color: #9aa3b2; }
  .card.rare   { border-color: #4da6ff; box-shadow: 0 0 22px rgba(77,166,255,.45); }
  .card.rare   .rar { color: #4da6ff; }
  .card.epic   { border-color: #b06bff; box-shadow: 0 0 26px rgba(176,107,255,.55); }
  .card.epic   .rar { color: #c88bff; }
  .card.ssr    { border-color: #ffd24a; box-shadow: 0 0 40px rgba(255,210,74,.8); }
  .card.ssr    .rar { color: #ffd24a; }
  .card.ssr    .name { color: #ffe89a; }

  /* animasi reveal */
  @keyframes pop { 0% { transform: scale(.5); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  @keyframes glowpulse { 0%,100%{box-shadow:0 0 30px rgba(255,210,74,.7)} 50%{box-shadow:0 0 55px rgba(255,210,74,1)} }
  .card.reveal { animation: pop .4s ease; }
  .card.ssr.reveal { animation: pop .4s ease, shake .5s ease .4s, glowpulse 1.2s ease-in-out .4s 2; }

  .buttons { display: flex; gap: 12px; margin-bottom: 22px; }
  .btn {
    flex: 1; padding: 15px 0; border: none; border-radius: 14px;
    font-size: 16px; font-weight: 800; letter-spacing: 1px; cursor: pointer;
    color: #0a0d1c; background: linear-gradient(180deg,#8fd3ff,#4da6ff);
    transition: transform .08s ease, filter .15s ease;
  }
  .btn:hover { filter: brightness(1.08); }
  .btn:active { transform: scale(.95); }
  .btn.gold { background: linear-gradient(180deg,#ffe58a,#ffb347); }

  .hist-lbl { font-size: 11px; color: #8b90b0; text-transform: uppercase; letter-spacing: 1px; text-align: left; margin-bottom: 8px; }
  .history { display: flex; flex-wrap: wrap; gap: 6px; min-height: 34px; }
  .chip {
    font-size: 20px; width: 38px; height: 38px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    background: #171b30; border: 2px solid #2a2f4a;
  }
  .chip img { width: 32px; height: 32px; object-fit: contain; }
  .chip.rare { border-color: #4da6ff; }
  .chip.epic { border-color: #b06bff; }
  .chip.ssr  { border-color: #ffd24a; box-shadow: 0 0 10px rgba(255,210,74,.6); }
</style>
</head>
<body>
  <div class="app">
    <h1>POKEMON GACHA</h1>
    <div class="subtitle">tarik Pokemon dari data live PokeAPI</div>

    <div class="stats">
      <div class="stat"><div class="num" id="total">0</div><div class="lbl">Total Tarik</div></div>
      <div class="stat"><div class="num" id="ssrCount">0</div><div class="lbl">SSR Didapat</div></div>
    </div>

    <div class="pity">
      <div class="pity-top"><span>Pity ke SSR gratis</span><span id="pityText">0 / 10</span></div>
      <div class="pity-track"><div class="pity-fill" id="pityFill"></div></div>
    </div>

    <div class="stage">
      <div class="card" id="card">
        <img class="sprite" id="cardImage" alt="" hidden>
        <div class="emoji" id="cardEmoji">?</div>
        <div class="name" id="cardName">Tekan TARIK</div>
        <div class="rar" id="cardRarity"></div>
        <div class="types" id="cardTypes"></div>
        <div class="meta" id="cardMeta"></div>
      </div>
    </div>

    <div class="buttons">
      <button class="btn" id="tarik1">TARIK 1x</button>
      <button class="btn gold" id="tarik10">TARIK 10x</button>
    </div>

    <div class="hist-lbl">Riwayat Terakhir</div>
    <div class="history" id="history"></div>
  </div>

<script>
  const BATAS_PITY = 10;

  const hadiah = {
    ssr: [
      { n: "Laptop Baru", e: "💻" },
      { n: "Beasiswa Full", e: "🎓" },
      { n: "ETHJKT Hoodie", e: "🧥" }
    ],
    epic: [
      { n: "Sticker Pack", e: "✨" },
      { n: "Kopi Gratis", e: "☕" },
      { n: "Gas Fee Aman", e: "⛽" }
    ],
    rare: [
      { n: "Mentor 1 Jam", e: "🧑‍🏫" },
      { n: "Notebook", e: "📓" },
      { n: "Keyboard Clicky", e: "⌨️" }
    ],
    common: [
      { n: "Semangat Lagi", e: "🔥" },
      { n: "Pulpen", e: "🖊️" },
      { n: "Air Mineral", e: "💧" },
      { n: "Debug Tipis", e: "🐞" }
    ]
  };

  let pity = 0;
  let total = 0;
  let ssrCount = 0;

  const elemen = {
    total: document.getElementById("total"),
    ssrCount: document.getElementById("ssrCount"),
    pityText: document.getElementById("pityText"),
    pityFill: document.getElementById("pityFill"),
    card: document.getElementById("card"),
    cardEmoji: document.getElementById("cardEmoji"),
    cardName: document.getElementById("cardName"),
    cardRarity: document.getElementById("cardRarity"),
    history: document.getElementById("history"),
    tarik1: document.getElementById("tarik1"),
    tarik10: document.getElementById("tarik10")
  };

  function pilihAcak(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function ambilHadiah(kelas) {
    const item = pilihAcak(hadiah[kelas]);
    return { kelas, nama: item.n, emoji: item.e };
  }

  function rollSatu() {
    total += 1;
    pity += 1;

    const angkaAcak = Math.random();

    // Pity membuat SSR pasti muncul maksimal setiap 10 tarikan.
    if (pity >= BATAS_PITY || angkaAcak < 0.03) {
      pity = 0;
      ssrCount += 1;
      return ambilHadiah("ssr");
    }

    if (angkaAcak < 0.10) return ambilHadiah("epic");
    if (angkaAcak < 0.30) return ambilHadiah("rare");
    return ambilHadiah("common");
  }

  function tampilkan(hasil) {
    elemen.cardEmoji.textContent = hasil.emoji;
    elemen.cardName.textContent = hasil.nama;
    elemen.cardRarity.textContent = hasil.kelas.toUpperCase();

    elemen.card.className = "card";
    void elemen.card.offsetWidth;
    elemen.card.className = `card ${hasil.kelas} reveal`;

    elemen.total.textContent = total;
    elemen.ssrCount.textContent = ssrCount;
    elemen.pityText.textContent = `${pity} / ${BATAS_PITY}`;
    elemen.pityFill.style.width = `${(pity / BATAS_PITY) * 100}%`;
  }

  function tambahRiwayat(hasil) {
    const chip = document.createElement("div");
    chip.className = `chip ${hasil.kelas}`;
    chip.textContent = hasil.emoji;
    chip.title = `${hasil.nama} (${hasil.kelas.toUpperCase()})`;

    elemen.history.prepend(chip);

    while (elemen.history.children.length > 12) {
      elemen.history.lastElementChild.remove();
    }
  }

  function tarik(jumlah) {
    let hasilTerakhir;

    for (let i = 0; i < jumlah; i += 1) {
      hasilTerakhir = rollSatu();
      tambahRiwayat(hasilTerakhir);
    }

    tampilkan(hasilTerakhir);
  }

  elemen.tarik1.addEventListener("click", () => tarik(1));
  elemen.tarik10.addEventListener("click", () => tarik(10));
</script>
</body>
</html>
