<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>PokéPack Studio - Pokémon Gacha Simulator</title>
     <script src="https://cdn.tailwindcss.com"></script>
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
          rel="stylesheet">
     <link rel="stylesheet" href="styles.css">
</head>

<body>
     <div class="app-shell">
          <header class="topbar glass-card">
               <button class="brand" data-view-jump="gacha" aria-label="Go to gacha">
                    <span class="brand-ball" aria-hidden="true"></span>
                    <span>
                         <strong>PokéPack Studio</strong>
                         <small>Powered by PokéAPI</small>
                    </span>
               </button>
               <nav class="nav-tabs">
                    <button class="nav-link active" data-view="gacha">Gacha</button>
                    <button class="nav-link" data-view="collection">Collection</button>
                    <button class="nav-link" data-view="stats">Stats</button>
               </nav>
          </header>

          <main>
               <section id="gacha" class="view active-view">
                    <div class="gacha-page">
                         <section class="pack-arena glass-card" aria-label="Booster pack opening arena">
                              <div class="studio-lockup">
                                   <span class="brand-ball" aria-hidden="true"></span>
                                   <div>
                                        <p class="eyebrow">PokéPack Studio</p>
                                        <h1>Open one pack</h1>
                                   </div>
                              </div>
                              <div class="arena-glow" id="arena-glow"></div>
                              <div class="center-pack stage-pack" id="stage-pack">
                                   <div class="pack-band">PokéPack</div>
                                   <div class="pack-ball"></div>
                                   <div class="pack-title">Spark<br>Vault</div>
                                   <div class="pack-footer">5 Pokémon</div>
                              </div>
                              <div class="pack-controls">
                                   <button class="primary-btn wide" id="open-pack">Open Pack</button>
                                   <button class="ghost-btn wide" id="refresh-cache">Refresh Cache</button>
                              </div>
                              <div class="rate-table" id="rate-table"></div>
                              <div class="flash" id="flash"></div>
                              <div id="pull-results" class="pull-results"></div>
                         </section>
                    </div>
               </section>

               <section id="collection" class="view">
                    <div class="collection-hero glass-card">
                         <div>
                              <p class="eyebrow">Trainer vault</p>
                              <h2>Your collection</h2>
                         </div>
                         <div class="progress-wrap">
                              <span id="completion-label">0% complete</span>
                              <div class="progress-track">
                                   <div id="completion-bar"></div>
                              </div>
                         </div>
                    </div>

                    <div class="toolbar glass-card">
                         <input class="input" id="search-input" placeholder="Search name, species, ability...">
                         <select class="input" id="type-filter">
                              <option value="all">All types</option>
                         </select>
                         <select class="input" id="rarity-filter">
                              <option value="all">All rarities</option>
                              <option>Common</option>
                              <option>Uncommon</option>
                              <option>Rare</option>
                              <option>Epic</option>
                              <option>Legendary</option>
                         </select>
                         <select class="input" id="sort-select">
                              <option value="newest">Newest</option>
                              <option value="number">Pokédex number</option>
                              <option value="name">Name A-Z</option>
                              <option value="rarity">Rarity</option>
                              <option value="dupes">Duplicates</option>
                         </select>
                         <button class="danger-btn" id="reset-collection">Reset</button>
                    </div>

                    <div id="collection-grid" class="collection-grid"></div>
               </section>

               <section id="stats" class="view">
                    <div id="stats-grid" class="quick-stats stats-page-grid"></div>
                    <div class="history-panel glass-card">
                         <div class="section-heading compact">
                              <div>
                                   <p class="eyebrow">Recent pulls</p>
                                   <h2>Pull history</h2>
                              </div>
                         </div>
                         <div id="history-list" class="history-list"></div>
                    </div>
               </section>
          </main>
     </div>

     <dialog id="pokemon-dialog" class="pokemon-dialog">
          <button id="dialog-close" class="dialog-close" aria-label="Close details">×</button>
          <div id="dialog-content"></div>
     </dialog>

     <div id="toast" class="toast"></div>
     <canvas id="confetti" aria-hidden="true"></canvas>
     <div class="js-compat" hidden>
          <button id="hero-open-pack" type="button">Open Pack</button>
          <span id="api-status">Preparing PokéAPI cache...</span>
          <div id="home-stats"></div>
          <div id="featured-grid" class="loading-grid"></div>
     </div>
     <script src="app.js"></script>
</body>

</html>
