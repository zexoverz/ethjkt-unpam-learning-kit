<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gacha ETHJKT</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at 50% 0%, #1b2140 0%, #0a0d1c 70%);
    color: #eaeaf0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .layout {
    width: 100%; max-width: 900px;
    display: grid; grid-template-columns: minmax(320px, 460px) minmax(260px, 360px);
    gap: 18px; align-items: start; justify-content: center;
  }
  .app {
    width: 100%; text-align: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px; padding: 24px 22px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  h1 {
    font-size: 26px; letter-spacing: 1px; margin-bottom: 4px;
    background: linear-gradient(90deg,#ffd86b,#ff7eb3,#7ee8ff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .subtitle { font-size: 12px; color: #8b90b0; margin-bottom: 18px; }

  .stats { display: flex; gap: 10px; margin-bottom: 12px; }
  .stat {
    flex: 1; background: rgba(255,255,255,0.05); border-radius: 12px;
    padding: 10px 6px;
  }
  .stat .num { font-size: 22px; font-weight: 700; }
  .stat .lbl { font-size: 11px; color: #8b90b0; text-transform: uppercase; letter-spacing: 1px; }

  .pity { margin-bottom: 18px; text-align: left; }
  .pity-top { display: flex; justify-content: space-between; font-size: 12px; color: #b9bdd8; margin-bottom: 6px; }
  .pity-track { height: 10px; background: rgba(255,255,255,0.08); border-radius: 6px; overflow: hidden; }
  .pity-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg,#ffd86b,#ffb347);
    transition: width 0.35s ease;
  }

  .stage { display: flex; justify-content: center; margin-bottom: 20px; }
  .card {
    width: 180px; height: 230px; border-radius: 18px;
    background: #171b30; border: 3px solid #2a2f4a;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; position: relative;
  }
  .card .emoji { font-size: 74px; line-height: 1; filter: drop-shadow(0 4px 10px rgba(0,0,0,.5)); }
  .card .name { font-size: 17px; font-weight: 700; padding: 0 8px; }
  .card .rar { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; opacity: .9; }

  /* warna per rarity */
  .card.common { border-color: #6b7280; }
  .card.common .rar { color: #9aa3b2; }
  .card.rare   { border-color: #4da6ff; box-shadow: 0 0 22px rgba(77,166,255,.45); }
  .card.rare   .rar { color: #4da6ff; }
  .card.epic   { border-color: #b06bff; box-shadow: 0 0 26px rgba(176,107,255,.55); }
  .card.epic   .rar { color: #c88bff; }
  .card.ssr    { border-color: #ffd24a; box-shadow: 0 0 40px rgba(255,210,74,.8); }
  .card.ssr    .rar { color: #ffd24a; }
  .card.ssr    .name { color: #ffe89a; }

  /* animasi reveal */
  @keyframes pop { 0% { transform: scale(.5); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  @keyframes glowpulse { 0%,100%{box-shadow:0 0 30px rgba(255,210,74,.7)} 50%{box-shadow:0 0 55px rgba(255,210,74,1)} }
  .card.reveal { animation: pop .4s ease; }
  .card.ssr.reveal { animation: pop .4s ease, shake .5s ease .4s, glowpulse 1.2s ease-in-out .4s 2; }

  .buttons { display: flex; gap: 12px; margin-bottom: 22px; }
  .btn {
    flex: 1; padding: 15px 0; border: none; border-radius: 14px;
    font-size: 16px; font-weight: 800; letter-spacing: 1px; cursor: pointer;
    color: #0a0d1c; background: linear-gradient(180deg,#8fd3ff,#4da6ff);
    transition: transform .08s ease, filter .15s ease;
  }
  .btn:hover { filter: brightness(1.08); }
  .btn:active { transform: scale(.95); }
  .btn.gold { background: linear-gradient(180deg,#ffe58a,#ffb347); }

  .hist-lbl { font-size: 11px; color: #8b90b0; text-transform: uppercase; letter-spacing: 1px; text-align: left; margin-bottom: 8px; }
  .history { display: flex; flex-wrap: wrap; gap: 6px; min-height: 34px; }
  .chip {
    font-size: 20px; width: 34px; height: 34px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    background: #171b30; border: 2px solid #2a2f4a;
  }
  .chip.rare { border-color: #4da6ff; }
  .chip.epic { border-color: #b06bff; }
  .chip.ssr  { border-color: #ffd24a; box-shadow: 0 0 10px rgba(255,210,74,.6); }

  .collection {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px; padding: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  }
  .collection h2 {
    font-size: 18px; margin-bottom: 4px;
    color: #f5f7ff;
  }
  .collection-subtitle {
    font-size: 12px; color: #8b90b0; margin-bottom: 16px;
  }
  .collection-group { margin-bottom: 16px; }
  .collection-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .collection-title {
    font-size: 12px; font-weight: 800; letter-spacing: 1px;
    text-transform: uppercase;
  }
  .collection-title.ssr { color: #ffd24a; }
  .collection-title.rare { color: #4da6ff; }
  .collection-count {
    font-size: 12px; color: #b9bdd8;
  }
  .collection-list {
    display: grid; gap: 8px; min-height: 46px; max-height: 240px;
    overflow-y: auto; padding-right: 6px;
    scrollbar-width: thin;
    scrollbar-color: #ffd24a rgba(255,255,255,0.06);
  }
  .collection-list::-webkit-scrollbar {
    width: 8px;
  }
  .collection-list::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.06);
    border-radius: 999px;
  }
  .collection-list::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg,#ffd24a,#4da6ff);
    border-radius: 999px;
    border: 2px solid #171b30;
  }
  .collection-list::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg,#ffe58a,#7ee8ff);
  }
  .collection-empty {
    font-size: 12px; color: #686e8d;
    border: 1px dashed rgba(255,255,255,0.12);
    border-radius: 12px; padding: 14px 10px; text-align: center;
  }
  .collection-item {
    display: grid; grid-template-columns: 42px 1fr; gap: 10px; align-items: center;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 8px;
  }
  .collection-item.ssr { border-color: rgba(255,210,74,.55); }
  .collection-item.rare { border-color: rgba(77,166,255,.5); }
  .collection-emoji {
    width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;
    background: #171b30; border-radius: 10px; font-size: 24px;
  }
  .collection-name {
    font-size: 13px; font-weight: 700; line-height: 1.25;
  }
  .collection-meta {
    font-size: 11px; color: #8b90b0; margin-top: 2px;
  }

  @media (max-width: 780px) {
    .layout { grid-template-columns: 1fr; max-width: 460px; }
  }
</style>
</head>
<body>
  <div class="layout">
    <div class="app">
      <h1>GACHA ETHJKT</h1>
      <div class="subtitle">tarik hokimu, pamerin ke temen sebelah</div>

      <div class="stats">
        <div class="stat"><div class="num" id="total">0</div><div class="lbl">Total Tarik</div></div>
        <div class="stat"><div class="num" id="ssrCount">0</div><div class="lbl">SSR Didapat</div></div>
      </div>

      <div class="pity">
        <div class="pity-top"><span>Pity ke SSR gratis</span><span id="pityText">0 / 10</span></div>
        <div class="pity-track"><div class="pity-fill" id="pityFill"></div></div>
      </div>

      <div class="stage">
        <div class="card" id="card">
          <div class="emoji" id="cardEmoji">?</div>
          <div class="name" id="cardName">Tekan TARIK</div>
          <div class="rar" id="cardRarity"></div>
        </div>
      </div>

      <div class="buttons">
        <button class="btn" id="tarik1">TARIK 1x</button>
        <button class="btn gold" id="tarik10">TARIK 10x</button>
      </div>

      <div class="hist-lbl">Riwayat Terakhir</div>
      <div class="history" id="history"></div>
    </div>

    <aside class="collection">
      <h2>Koleksi Hadiah</h2>
      <div class="collection-subtitle">SSR dan RARE yang berhasil kamu dapatkan</div>

      <div class="collection-group">
        <div class="collection-head">
          <div class="collection-title ssr">SSR Collection</div>
          <div class="collection-count" id="ssrCollectionCount">0 item</div>
        </div>
        <div class="collection-list" id="ssrCollection">
          <div class="collection-empty">Belum ada SSR</div>
        </div>
      </div>

      <div class="collection-group">
        <div class="collection-head">
          <div class="collection-title rare">RARE Collection</div>
          <div class="collection-count" id="rareCollectionCount">0 item</div>
        </div>
        <div class="collection-list" id="rareCollection">
          <div class="collection-empty">Belum ada RARE</div>
        </div>
      </div>
    </aside>
  </div>

<script>
  // ==========================================================
  // MISI HARI 1 - GACHA SIMULATOR (STARTER)
  //
  // Tampilan (HTML + CSS) udah jadi. TUGAS kamu: bikin LOGIKA-nya.
  // JANGAN ketik manual. SURUH Codex yang nulis tiap CHECKPOINT,
  // kamu BACA & VERIFIKASI. Save file -> refresh browser buat lihat.
  //
  // Ikutin urutan checkpoint di README.md. Contoh prompt ada di sana.
  // ==========================================================

  // CHECKPOINT 1 - Data & acak
  // Object hadiah menyimpan daftar item berdasarkan tingkat kelangkaannya.
  const hadiah = {
    ssr: [
      { n: "Raja Blockchain", e: "\uD83E\uDD34" },
      { n: "Penyihir Smart Contract", e: "\uD83E\uDDD9" },
      { n: "Wajah Auto Sultan", e: "\uD83E\uDD29" }
    ],
    epic: [
      { n: "Coder Fokus", e: "\uD83E\uDDD1\u200D\uD83D\uDCBB" },
      { n: "Si Paling Keren", e: "\uD83D\uDE0E" },
      { n: "Mode Ngegas", e: "\uD83D\uDE24" }
    ],
    rare: [
      { n: "Nerd Pintar", e: "\uD83E\uDD13" },
      { n: "Senyum Menang", e: "\uD83D\uDE04" },
      { n: "Mikir Dulu", e: "\uD83E\uDD14" }
    ],
    common: [
      { n: "Senyum Biasa", e: "\uD83D\uDE42" },
      { n: "Ketawa Gugup", e: "\uD83D\uDE05" },
      { n: "Muka Datar", e: "\uD83D\uDE10" },
      { n: "Nangis Karena Error", e: "\uD83D\uDE2D" }
    ]
  };

  // Variabel state untuk menyimpan kondisi permainan saat ini.
  let pity = 0;
  let total = 0;
  let ssrCount = 0;
  let koleksiSSR = [];
  let koleksiRare = [];

  // Fungsi ini mengambil satu item random dari array yang diberikan.
  function pilihAcak(arr) {
    const indexAcak = Math.floor(Math.random() * arr.length);
    return arr[indexAcak];
  }

  // CHECKPOINT 2 - Logika tarikan
  // Fungsi ini menjalankan satu kali gacha dan menentukan rarity hasilnya.
  function rollSatu() {
    total++;
    pity++;

    // Math.random() menghasilkan angka dari 0 sampai kurang dari 1.
    const acak = Math.random();
    let kelas;

    // Jika pity sudah 10 atau random masuk 3%, pemain mendapat SSR.
    if (pity >= 10 || acak < 0.03) {
      kelas = "ssr";
      pity = 0;
      ssrCount++;
    } else if (acak < 0.10) {
      // Angka 0.03 sampai kurang dari 0.10 berarti peluang EPIC sekitar 7%.
      kelas = "epic";
    } else if (acak < 0.30) {
      // Angka 0.10 sampai kurang dari 0.30 berarti peluang RARE sekitar 20%.
      kelas = "rare";
    } else {
      // Sisanya menjadi COMMON, peluang paling besar sekitar 70%.
      kelas = "common";
    }

    // Ambil hadiah sesuai rarity yang terpilih.
    const item = pilihAcak(hadiah[kelas]);

    // Hasil dikembalikan dalam format yang mudah dipakai fungsi tampilan.
    return {
      kelas: kelas,
      nama: item.n,
      emoji: item.e
    };
  }

  // CHECKPOINT 3 - Tampilkan + animasi
  // Simpan elemen HTML yang sering dipakai agar kode lebih rapi.
  const card = document.getElementById("card");
  const cardEmoji = document.getElementById("cardEmoji");
  const cardName = document.getElementById("cardName");
  const cardRarity = document.getElementById("cardRarity");
  const totalEl = document.getElementById("total");
  const ssrCountEl = document.getElementById("ssrCount");
  const pityText = document.getElementById("pityText");
  const pityFill = document.getElementById("pityFill");
  const history = document.getElementById("history");
  const tarik1 = document.getElementById("tarik1");
  const tarik10 = document.getElementById("tarik10");
  const ssrCollection = document.getElementById("ssrCollection");
  const rareCollection = document.getElementById("rareCollection");
  const ssrCollectionCount = document.getElementById("ssrCollectionCount");
  const rareCollectionCount = document.getElementById("rareCollectionCount");

  // Fungsi ini menampilkan hasil gacha ke kartu utama dan statistik.
  function tampilkan(hasil) {
    cardEmoji.textContent = hasil.emoji;
    cardName.textContent = hasil.nama;
    cardRarity.textContent = hasil.kelas.toUpperCase();

    // Reset class lebih dulu agar animasi reveal bisa berjalan setiap roll.
    card.className = "card";
    card.offsetWidth;
    card.className = "card " + hasil.kelas + " reveal";

    // Update angka total tarikan dan jumlah SSR yang sudah didapat.
    totalEl.textContent = total;
    ssrCountEl.textContent = ssrCount;

    // Update teks dan progress bar pity menuju jaminan SSR.
    pityText.textContent = pity + " / 10";
    pityFill.style.width = (pity / 10 * 100) + "%";
  }

  // CHECKPOINT 4 - Riwayat + tombol
  // Fungsi ini menambahkan emoji hasil terbaru ke riwayat tarikan.
  function tambahRiwayat(hasil) {
    const chip = document.createElement("div");
    chip.className = "chip " + hasil.kelas;
    chip.textContent = hasil.emoji;
    chip.title = hasil.nama + " - " + hasil.kelas.toUpperCase();

    // Hasil terbaru ditaruh di depan agar mudah dilihat.
    history.prepend(chip);

    // Batasi riwayat maksimal 12 item supaya tampilan tetap rapi.
    while (history.children.length > 12) {
      history.removeChild(history.lastElementChild);
    }
  }

  // Fungsi ini membuat tampilan item kecil untuk panel koleksi.
  function buatItemKoleksi(hasil, urutan) {
    const item = document.createElement("div");
    item.className = "collection-item " + hasil.kelas;

    const emoji = document.createElement("div");
    emoji.className = "collection-emoji";
    emoji.textContent = hasil.emoji;

    const info = document.createElement("div");

    const nama = document.createElement("div");
    nama.className = "collection-name";
    nama.textContent = hasil.nama;

    const meta = document.createElement("div");
    meta.className = "collection-meta";
    meta.textContent = hasil.kelas.toUpperCase() + " #" + urutan;

    info.appendChild(nama);
    info.appendChild(meta);
    item.appendChild(emoji);
    item.appendChild(info);

    return item;
  }

  // Fungsi ini menggambar ulang daftar koleksi SSR atau RARE.
  function renderKoleksi(list, target, counter, teksKosong) {
    target.innerHTML = "";
    counter.textContent = list.length + " item";

    // Jika belum ada item, tampilkan teks kosong sebagai placeholder.
    if (list.length === 0) {
      const kosong = document.createElement("div");
      kosong.className = "collection-empty";
      kosong.textContent = teksKosong;
      target.appendChild(kosong);
      return;
    }

    // Item terbaru ditampilkan di atas supaya hadiah terakhir mudah dilihat.
    list.forEach(function (hasil, index) {
      const urutan = list.length - index;
      target.appendChild(buatItemKoleksi(hasil, urutan));
    });
  }

  // Fungsi ini menyimpan hanya hadiah SSR dan RARE ke panel koleksi.
  function tambahKoleksi(hasil) {
    if (hasil.kelas === "ssr") {
      koleksiSSR.unshift(hasil);
      renderKoleksi(koleksiSSR, ssrCollection, ssrCollectionCount, "Belum ada SSR");
    }

    if (hasil.kelas === "rare") {
      koleksiRare.unshift(hasil);
      renderKoleksi(koleksiRare, rareCollection, rareCollectionCount, "Belum ada RARE");
    }
  }

  // Fungsi pembantu untuk menjalankan satu roll lengkap.
  function tarikSekali() {
    const hasil = rollSatu();
    tampilkan(hasil);
    tambahRiwayat(hasil);
    tambahKoleksi(hasil);
  }

  // Tombol TARIK 1x menjalankan satu kali gacha.
  tarik1.addEventListener("click", function () {
    tarikSekali();
  });

  // Tombol TARIK 10x menjalankan gacha sepuluh kali berurutan.
  tarik10.addEventListener("click", function () {
    for (let i = 0; i < 10; i++) {
      tarikSekali();
    }
  });

  // >> Buka Codex, kerjain checkpoint SATU PER SATU. Baca hasilnya.
  // >> Kamu PILOT-nya, bukan penonton.
</script>
</body>
</html>
