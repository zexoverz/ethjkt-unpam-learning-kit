<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokemon Gacha Simulator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #10131f;
    --panel: rgba(255, 255, 255, 0.06);
    --line: rgba(255, 255, 255, 0.12);
    --muted: #9aa3b2;
    --text: #f4f7fb;
    --red: #ef4444;
    --blue: #3b82f6;
    --gold: #facc15;
  }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background:
      radial-gradient(circle at 20% 10%, rgba(239, 68, 68, 0.24), transparent 32%),
      radial-gradient(circle at 80% 0%, rgba(59, 130, 246, 0.24), transparent 30%),
      var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .app {
    width: 100%;
    max-width: 520px;
    text-align: center;
    background: rgba(16, 19, 31, 0.86);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 24px 22px 28px;
    box-shadow: 0 20px 70px rgba(0, 0, 0, 0.48);
  }
  h1 {
    font-size: 26px;
    letter-spacing: 0;
    margin-bottom: 6px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 18px;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 14px;
  }
  .stat {
    background: var(--panel);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    padding: 10px 6px;
  }
  .stat .num {
    font-size: 21px;
    font-weight: 800;
  }
  .stat .lbl {
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .pity {
    margin-bottom: 18px;
    text-align: left;
  }
  .pity-top {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    color: #cbd5e1;
    font-size: 12px;
    margin-bottom: 6px;
  }
  .pity-track {
    height: 10px;
    background: rgba(255, 255, 255, 0.09);
    border-radius: 999px;
    overflow: hidden;
  }
  .pity-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--blue), var(--gold));
    transition: width 0.3s ease;
  }
  .stage {
    display: flex;
    justify-content: center;
    margin-bottom: 18px;
  }
  .card {
    width: min(100%, 240px);
    min-height: 310px;
    background: #171b2c;
    border: 3px solid #2f374f;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute;
    inset: 14px 14px auto auto;
    width: 52px;
    height: 52px;
    border: 8px solid rgba(255, 255, 255, 0.08);
    border-radius: 50%;
  }
  .sprite-wrap {
    width: 164px;
    height: 164px;
    align-self: center;
    display: grid;
    place-items: center;
    margin-top: 8px;
  }
  .sprite {
    width: 150px;
    height: 150px;
    object-fit: contain;
    image-rendering: pixelated;
    filter: drop-shadow(0 14px 20px rgba(0, 0, 0, 0.42));
  }
  .placeholder {
    color: var(--muted);
    font-size: 64px;
    font-weight: 900;
  }
  .card-name {
    font-size: 20px;
    font-weight: 900;
    text-transform: capitalize;
  }
  .rarity {
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .types {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    min-height: 27px;
  }
  .type {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 999px;
    color: #dce5f2;
    font-size: 11px;
    font-weight: 700;
    padding: 5px 9px;
    text-transform: uppercase;
  }
  .card.common { border-color: #6b7280; }
  .card.common .rarity { color: #cbd5e1; }
  .card.rare { border-color: #38bdf8; box-shadow: 0 0 24px rgba(56, 189, 248, 0.35); }
  .card.rare .rarity { color: #67e8f9; }
  .card.epic { border-color: #a855f7; box-shadow: 0 0 28px rgba(168, 85, 247, 0.44); }
  .card.epic .rarity { color: #d8b4fe; }
  .card.ssr { border-color: var(--gold); box-shadow: 0 0 44px rgba(250, 204, 21, 0.64); }
  .card.ssr .rarity, .card.ssr .card-name { color: #fde68a; }
  @keyframes pop {
    0% { transform: scale(0.72); opacity: 0; }
    65% { transform: scale(1.04); }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes flash {
    50% { filter: brightness(1.45); }
  }
  .card.reveal { animation: pop 0.35s ease; }
  .card.ssr.reveal { animation: pop 0.35s ease, flash 0.75s ease 0.28s 2; }
  .buttons {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
  }
  .btn {
    flex: 1;
    min-height: 52px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(180deg, #60a5fa, #2563eb);
    color: white;
    cursor: pointer;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 0.7px;
    transition: transform 0.08s ease, filter 0.15s ease;
  }
  .btn.gold {
    background: linear-gradient(180deg, #fde047, #f59e0b);
    color: #201a05;
  }
  .btn:hover { filter: brightness(1.06); }
  .btn:active { transform: scale(0.96); }
  .btn:disabled {
    cursor: wait;
    filter: grayscale(0.5) brightness(0.72);
  }
  .status {
    color: #cbd5e1;
    font-size: 12px;
    min-height: 18px;
    margin-bottom: 16px;
  }
  .hist-lbl {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 1px;
    margin-bottom: 8px;
    text-align: left;
    text-transform: uppercase;
  }
  .history {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 7px;
    min-height: 46px;
  }
  .chip {
    aspect-ratio: 1;
    background: #171b2c;
    border: 2px solid #2f374f;
    border-radius: 9px;
    display: grid;
    place-items: center;
    overflow: hidden;
  }
  .chip img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    image-rendering: pixelated;
  }
  .chip.rare { border-color: #38bdf8; }
  .chip.epic { border-color: #a855f7; }
  .chip.ssr { border-color: var(--gold); box-shadow: 0 0 12px rgba(250, 204, 21, 0.55); }
  @media (max-width: 420px) {
    .app { padding: 20px 16px 24px; }
    .buttons { flex-direction: column; }
    .stats { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <main class="app">
    <h1>Pokemon Gacha Simulator</h1>
    <p class="subtitle">Data Pokemon diambil dari PokeAPI, pity target dibuat acak setiap SSR.</p>

    <section class="stats" aria-label="Statistik gacha">
      <div class="stat"><div class="num" id="total">0</div><div class="lbl">Total Pull</div></div>
      <div class="stat"><div class="num" id="ssrCount">0</div><div class="lbl">SSR</div></div>
      <div class="stat"><div class="num" id="pityTargetText">?</div><div class="lbl">Target Pity</div></div>
    </section>

    <section class="pity" aria-label="Progress pity">
      <div class="pity-top"><span>Progress menuju SSR pasti</span><span id="pityText">0 / ?</span></div>
      <div class="pity-track"><div class="pity-fill" id="pityFill"></div></div>
    </section>

    <section class="stage" aria-live="polite">
      <article class="card" id="card">
        <div class="sprite-wrap" id="spriteWrap"><span class="placeholder">?</span></div>
        <div>
          <div class="card-name" id="cardName">Tekan Pull</div>
          <div class="rarity" id="cardRarity">Pokemon</div>
        </div>
        <div class="types" id="cardTypes"></div>
      </article>
    </section>

    <div class="buttons">
      <button class="btn" id="pull1" type="button">PULL 1x</button>
      <button class="btn gold" id="pull10" type="button">PULL 10x</button>
    </div>

    <p class="status" id="status">Siap menarik Pokemon dari Kanto Pokedex.</p>

    <div class="hist-lbl">Riwayat Terakhir</div>
    <div class="history" id="history"></div>
  </main>

<script>
  const API_ROOT = "https://pokeapi.co/api/v2";
  const MAX_POKEMON_ID = 151;
  const HISTORY_LIMIT = 12;
  const CACHE_PREFIX = "pokemon-gacha:";

  const rarityRules = {
    ssr: { label: "SSR", chance: 0.03 },
    epic: { label: "Epic", chance: 0.12 },
    rare: { label: "Rare", chance: 0.35 },
    common: { label: "Common", chance: 1 }
  };

  const state = {
    total: 0,
    ssrCount: 0,
    pity: 0,
    pityTarget: randomPityTarget(),
    isPulling: false
  };

  const el = {
    total: document.querySelector("#total"),
    ssrCount: document.querySelector("#ssrCount"),
    pityTargetText: document.querySelector("#pityTargetText"),
    pityText: document.querySelector("#pityText"),
    pityFill: document.querySelector("#pityFill"),
    card: document.querySelector("#card"),
    spriteWrap: document.querySelector("#spriteWrap"),
    cardName: document.querySelector("#cardName"),
    cardRarity: document.querySelector("#cardRarity"),
    cardTypes: document.querySelector("#cardTypes"),
    status: document.querySelector("#status"),
    history: document.querySelector("#history"),
    pull1: document.querySelector("#pull1"),
    pull10: document.querySelector("#pull10")
  };

  function randomPityTarget() {
    return randomInt(8, 14);
  }

  function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function capitalize(text) {
    return text
      .split("-")
      .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
      .join(" ");
  }

  async function fetchJson(url) {
    const cacheKey = CACHE_PREFIX + url;
    const cached = localStorage.getItem(cacheKey);

    if (cached) {
      return JSON.parse(cached);
    }

    const response = await fetch(url);
    if (!response.ok) {
      throw new Error(`PokeAPI error ${response.status}`);
    }

    const data = await response.json();
    localStorage.setItem(cacheKey, JSON.stringify(data));
    return data;
  }

  async function getPokemon(id) {
    const [pokemon, species] = await Promise.all([
      fetchJson(`${API_ROOT}/pokemon/${id}`),
      fetchJson(`${API_ROOT}/pokemon-species/${id}`)
    ]);

    return {
      id: pokemon.id,
      name: capitalize(pokemon.name),
      sprite: pokemon.sprites.other?.["official-artwork"]?.front_default || pokemon.sprites.front_default,
      types: pokemon.types.map((entry) => entry.type.name),
      statsTotal: pokemon.stats.reduce((sum, entry) => sum + entry.base_stat, 0),
      captureRate: species.capture_rate,
      isLegendary: species.is_legendary,
      isMythical: species.is_mythical
    };
  }

  function classifyPokemon(pokemon) {
    if (pokemon.isLegendary || pokemon.isMythical) return "ssr";
    if (pokemon.captureRate <= 45 || pokemon.statsTotal >= 520) return "epic";
    if (pokemon.captureRate <= 120 || pokemon.statsTotal >= 420) return "rare";
    return "common";
  }

  function rollRarity() {
    state.total += 1;
    state.pity += 1;

    if (state.pity >= state.pityTarget || Math.random() < rarityRules.ssr.chance) {
      state.pity = 0;
      state.ssrCount += 1;
      state.pityTarget = randomPityTarget();
      return "ssr";
    }

    const roll = Math.random();
    if (roll < rarityRules.epic.chance) return "epic";
    if (roll < rarityRules.rare.chance) return "rare";
    return "common";
  }

  async function rollPokemon() {
    const wantedRarity = rollRarity();

    // Try several random Pokemon so the public API data decides the final pool.
    for (let attempt = 0; attempt < 18; attempt += 1) {
      const pokemon = await getPokemon(randomInt(1, MAX_POKEMON_ID));
      const actualRarity = classifyPokemon(pokemon);

      if (actualRarity === wantedRarity || attempt === 17) {
        return { ...pokemon, rarity: attempt === 17 ? actualRarity : wantedRarity };
      }
    }
  }

  function renderPokemon(result) {
    el.card.className = "card";
    void el.card.offsetWidth;
    el.card.className = `card ${result.rarity} reveal`;

    el.spriteWrap.innerHTML = result.sprite
      ? `<img class="sprite" src="${result.sprite}" alt="${result.name}">`
      : '<span class="placeholder">?</span>';
    el.cardName.textContent = result.name;
    el.cardRarity.textContent = rarityRules[result.rarity].label;
    el.cardTypes.innerHTML = result.types.map((type) => `<span class="type">${type}</span>`).join("");

    updateStats();
  }

  function addHistory(result) {
    const chip = document.createElement("div");
    chip.className = `chip ${result.rarity}`;
    chip.title = `${result.name} - ${rarityRules[result.rarity].label}`;
    chip.innerHTML = result.sprite ? `<img src="${result.sprite}" alt="${result.name}">` : "?";
    el.history.prepend(chip);

    while (el.history.children.length > HISTORY_LIMIT) {
      el.history.lastElementChild.remove();
    }
  }

  function updateStats() {
    el.total.textContent = state.total;
    el.ssrCount.textContent = state.ssrCount;
    el.pityTargetText.textContent = state.pityTarget;
    el.pityText.textContent = `${state.pity} / ${state.pityTarget}`;
    el.pityFill.style.width = `${Math.min((state.pity / state.pityTarget) * 100, 100)}%`;
  }

  function setPulling(isPulling) {
    state.isPulling = isPulling;
    el.pull1.disabled = isPulling;
    el.pull10.disabled = isPulling;
  }

  async function pull(count) {
    if (state.isPulling) return;

    setPulling(true);
    el.status.textContent = `Mengambil data dari PokeAPI untuk ${count} pull...`;

    try {
      let lastResult;
      for (let i = 0; i < count; i += 1) {
        lastResult = await rollPokemon();
        renderPokemon(lastResult);
        addHistory(lastResult);
      }
      el.status.textContent = `${count} pull selesai. Terakhir dapat ${lastResult.name}.`;
    } catch (error) {
      el.status.textContent = "Gagal mengambil data PokeAPI. Cek internet lalu coba lagi.";
      console.error(error);
    } finally {
      setPulling(false);
    }
  }

  el.pull1.addEventListener("click", () => pull(1));
  el.pull10.addEventListener("click", () => pull(10));

  updateStats();
</script>
</body>
</html>
