<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokemon Gacha Simulator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --paper: #f8f3e8;
    --ink: #243044;
    --muted: #6f7787;
    --line: #d9d2c2;
    --red: #d94141;
    --blue: #2c73d2;
    --yellow: #f6c945;
    --green: #2f9f67;
  }

  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background:
      linear-gradient(135deg, rgba(217,65,65,.08) 25%, transparent 25%) -18px 0 / 36px 36px,
      linear-gradient(225deg, rgba(44,115,210,.08) 25%, transparent 25%) -18px 0 / 36px 36px,
      var(--paper);
    color: var(--ink); min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 18px;
  }
  .app {
    width: 100%; max-width: 760px;
    background: rgba(255,255,255,.82);
    border: 2px solid var(--line);
    border-radius: 8px; padding: 18px;
    box-shadow: 0 18px 42px rgba(36,48,68,.18);
  }
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 16px; }
  h1 {
    font-size: 24px; letter-spacing: 0; line-height: 1;
    color: var(--ink);
  }
  .subtitle { font-size: 13px; color: var(--muted); margin-top: 5px; }
  .api-badge {
    flex: 0 0 auto; font-size: 12px; font-weight: 800; color: #fff;
    background: var(--red); border: 2px solid #b93232; border-radius: 999px;
    padding: 7px 11px;
  }

  .layout { display: grid; grid-template-columns: minmax(0, 1fr) 260px; gap: 18px; align-items: start; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
  .stat {
    background: #fff; border: 1px solid var(--line); border-radius: 6px;
    padding: 10px 8px; text-align: center;
  }
  .stat .num { font-size: 22px; font-weight: 700; }
  .stat .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  .pity { margin-bottom: 18px; text-align: left; }
  .pity-top { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .pity-track { height: 10px; background: #e9e1d3; border-radius: 999px; overflow: hidden; }
  .pity-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg,var(--yellow),#f08f36);
    transition: width 0.35s ease;
  }

  .stage { display: flex; justify-content: center; margin-bottom: 20px; }
  .card {
    width: min(100%, 330px); min-height: 430px; border-radius: 8px;
    background: #fff; border: 3px solid #8d97a8;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; position: relative; padding: 18px;
    box-shadow: inset 0 0 0 6px #f2eadc;
  }
  .dex-no {
    position: absolute; top: 12px; left: 14px; font-size: 12px; font-weight: 800;
    color: var(--muted);
  }
  .sprite-frame {
    width: 100%; aspect-ratio: 1 / .82; border-radius: 6px;
    display: grid; place-items: center;
    background:
      linear-gradient(#eef6ff 1px, transparent 1px) 0 0 / 18px 18px,
      linear-gradient(90deg, #eef6ff 1px, transparent 1px) 0 0 / 18px 18px,
      #f8fbff;
    border: 1px solid #d8e5f5;
  }
  .pokemon-img {
    width: min(86%, 220px); height: auto;
    image-rendering: auto;
    filter: drop-shadow(0 12px 10px rgba(36,48,68,.18));
  }
  .card .emoji { font-size: 54px; line-height: 1; color: var(--muted); }
  .card .name { font-size: 25px; font-weight: 800; padding: 0 8px; text-transform: capitalize; text-align: center; }
  .card .rar { font-size: 12px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; opacity: .95; }
  .type-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; min-height: 26px; }
  .type-pill {
    border-radius: 999px; padding: 5px 9px; font-size: 11px; font-weight: 800;
    color: #fff; background: #7a8494; text-transform: uppercase;
  }
  .flavor {
    min-height: 48px; font-size: 13px; line-height: 1.45; color: var(--muted);
    text-align: center;
  }

  .card.common { border-color: #8d97a8; }
  .card.common .rar { color: #6f7787; }
  .card.rare   { border-color: var(--blue); box-shadow: 0 12px 30px rgba(44,115,210,.24); }
  .card.rare   .rar { color: var(--blue); }
  .card.epic   { border-color: #7b55d9; box-shadow: 0 12px 34px rgba(123,85,217,.28); }
  .card.epic   .rar { color: #7b55d9; }
  .card.ssr    { border-color: #d99b24; box-shadow: 0 16px 42px rgba(217,155,36,.35); }
  .card.ssr    .rar { color: #b57511; }
  .card.ssr    .name { color: #9a5d00; }

  @keyframes pop { 0% { transform: scale(.5); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  @keyframes glowpulse { 0%,100%{box-shadow:0 16px 42px rgba(217,155,36,.35)} 50%{box-shadow:0 18px 60px rgba(217,155,36,.62)} }
  .card.reveal { animation: pop .4s ease; }
  .card.ssr.reveal { animation: pop .4s ease, shake .5s ease .4s, glowpulse 1.2s ease-in-out .4s 2; }

  .buttons { display: flex; gap: 12px; margin-bottom: 22px; }
  .btn {
    flex: 1; padding: 14px 0; border: 2px solid #1e579f; border-radius: 6px;
    font-size: 15px; font-weight: 800; letter-spacing: 0; cursor: pointer;
    color: #fff; background: var(--blue);
    transition: transform .08s ease, filter .15s ease, opacity .15s ease;
  }
  .btn:hover { filter: brightness(1.08); }
  .btn:active { transform: scale(.95); }
  .btn.gold { background: var(--red); border-color: #b93232; }
  .btn:disabled { cursor: wait; opacity: .62; }

  .panel {
    background: #fff; border: 1px solid var(--line); border-radius: 6px; padding: 12px;
  }
  .hist-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; text-align: left; margin-bottom: 8px; }
  .history { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; min-height: 34px; }
  .chip {
    width: 100%; aspect-ratio: 1; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    background: #f8fbff; border: 2px solid #8d97a8; overflow: hidden;
  }
  .chip img { width: 90%; height: 90%; object-fit: contain; }
  .chip.rare { border-color: var(--blue); }
  .chip.epic { border-color: #7b55d9; }
  .chip.ssr  { border-color: #d99b24; box-shadow: 0 0 12px rgba(217,155,36,.28); }

  @media (max-width: 720px) {
    .layout { grid-template-columns: 1fr; }
    .topbar { align-items: flex-start; }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div>
        <h1>Pokemon Gacha</h1>
        <div class="subtitle">Pull Pokemon directly from PokeAPI.</div>
      </div>
      <div class="api-badge">PokeAPI</div>
    </div>

    <div class="layout">
      <main>
        <div class="stage">
          <div class="card" id="card">
            <div class="dex-no" id="dexNo">#---</div>
            <div class="sprite-frame">
              <img class="pokemon-img" id="pokemonImage" alt="" hidden>
              <div class="emoji" id="cardEmoji">?</div>
            </div>
            <div class="name" id="cardName">Tekan TARIK</div>
            <div class="rar" id="cardRarity"></div>
            <div class="type-row" id="typeRow"></div>
            <div class="flavor" id="flavorText">Pokemon akan muncul di sini setelah pull.</div>
          </div>
        </div>
      </main>

      <aside class="panel">
        <div class="stats">
          <div class="stat"><div class="num" id="total">0</div><div class="lbl">Total Pull</div></div>
          <div class="stat"><div class="num" id="ssrCount">0</div><div class="lbl">SSR</div></div>
          <div class="stat"><div class="num" id="seenCount">0</div><div class="lbl">Seen</div></div>
        </div>

        <div class="pity">
          <div class="pity-top"><span>Pity to SSR</span><span id="pityText">0 / 10</span></div>
          <div class="pity-track"><div class="pity-fill" id="pityFill"></div></div>
        </div>

        <div class="buttons">
          <button class="btn" id="tarik1">Pull 1x</button>
          <button class="btn gold" id="tarik10">Pull 10x</button>
        </div>

        <div class="hist-lbl">Last Pulls</div>
        <div class="history" id="history"></div>
      </aside>
    </div>
  </div>

<script>
  const hadiah = {
    ssr: [
      { n: "Legendary Builder", e: "🏆" },
      { n: "ETH Whale", e: "💎" },
      { n: "Smart Contract Master", e: "🧠" }
    ],
    epic: [
      { n: "Gas Optimizer", e: "⚡" },
      { n: "DeFi Strategist", e: "📈" },
      { n: "Node Guardian", e: "🛡️" }
    ],
    rare: [
      { n: "NFT Artist", e: "🎨" },
      { n: "Wallet Wizard", e: "🪄" },
      { n: "Testnet Hunter", e: "🧪" }
    ],
    common: [
      { n: "Fresh Learner", e: "📘" },
      { n: "Bug Fixer", e: "🔧" },
      { n: "Block Explorer", e: "🔎" },
      { n: "Coffee Coder", e: "☕" }
    ]
  };

  const maxPity = 10;
  let pity = 0;
  let total = 0;
  let ssrCount = 0;

  const card = document.getElementById("card");
  const cardEmoji = document.getElementById("cardEmoji");
  const cardName = document.getElementById("cardName");
  const cardRarity = document.getElementById("cardRarity");
  const totalText = document.getElementById("total");
  const ssrCountText = document.getElementById("ssrCount");
  const pityText = document.getElementById("pityText");
  const pityFill = document.getElementById("pityFill");
  const history = document.getElementById("history");
  const tarik1Button = document.getElementById("tarik1");
  const tarik10Button = document.getElementById("tarik10");

  function pilihAcak(daftarHadiah) {
    const index = Math.floor(Math.random() * daftarHadiah.length);
    return daftarHadiah[index];
  }

  function buatHasil(kelas) {
    const item = pilihAcak(hadiah[kelas]);
    return { kelas, nama: item.n, emoji: item.e };
  }

  function rollSatu() {
    total += 1;
    pity += 1;

    const acak = Math.random();
    let kelas = "common";

    // Pity menjamin SSR maksimal setiap 10 tarikan kalau belum beruntung.
    if (pity >= maxPity || acak < 0.03) {
      kelas = "ssr";
      pity = 0;
      ssrCount += 1;
    } else if (acak < 0.10) {
      kelas = "epic";
    } else if (acak < 0.30) {
      kelas = "rare";
    }

    return buatHasil(kelas);
  }

  function tampilkan(hasil) {
    cardEmoji.textContent = hasil.emoji;
    cardName.textContent = hasil.nama;
    cardRarity.textContent = hasil.kelas.toUpperCase();

    card.className = "card";
    void card.offsetWidth;
    card.className = `card ${hasil.kelas} reveal`;

    totalText.textContent = total;
    ssrCountText.textContent = ssrCount;
    pityText.textContent = `${pity} / ${maxPity}`;
    pityFill.style.width = `${(pity / maxPity) * 100}%`;
  }

  function tambahRiwayat(hasil) {
    const chip = document.createElement("div");
    chip.className = `chip ${hasil.kelas}`;
    chip.textContent = hasil.emoji;
    chip.title = `${hasil.nama} (${hasil.kelas.toUpperCase()})`;

    history.prepend(chip);

    while (history.children.length > 12) {
      history.lastElementChild.remove();
    }
  }

  function tarik(jumlahTarikan) {
    for (let i = 0; i < jumlahTarikan; i += 1) {
      const hasil = rollSatu();
      tampilkan(hasil);
      tambahRiwayat(hasil);
    }
  }

  tarik1Button.addEventListener("click", () => tarik(1));
  tarik10Button.addEventListener("click", () => tarik(10));
</script>
</body>
</html>
