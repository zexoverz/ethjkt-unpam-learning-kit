<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokemon Gacha</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    font-family: "Segoe UI", system-ui, sans-serif;
    color: #1f2933;
    background:
      radial-gradient(circle at 20% 15%, rgba(255, 203, 5, 0.34), transparent 28%),
      radial-gradient(circle at 82% 8%, rgba(59, 76, 202, 0.24), transparent 30%),
      linear-gradient(145deg, #f5f7fb 0%, #dfe7f2 48%, #eef2f7 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 18px;
  }

  .app {
    width: 100%;
    max-width: 520px;
    padding: 22px;
    border: 4px solid #263238;
    border-radius: 18px;
    background: #ffffff;
    box-shadow: 0 22px 55px rgba(31, 41, 51, 0.24);
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin-bottom: 16px;
  }

  .brand {
    text-align: left;
  }

  h1 {
    font-size: 28px;
    line-height: 1;
    letter-spacing: 0;
    color: #ffcb05;
    -webkit-text-stroke: 1.4px #2a55a2;
    text-shadow: 2px 2px 0 #17336d;
  }

  .subtitle {
    margin-top: 7px;
    color: #5d6b7a;
    font-size: 13px;
  }

  .api-badge {
    flex: 0 0 auto;
    padding: 8px 10px;
    border: 2px solid #2a55a2;
    border-radius: 8px;
    background: #f7fbff;
    color: #2a55a2;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }

  .stat {
    min-width: 0;
    padding: 10px 8px;
    border: 2px solid #d7dee8;
    border-radius: 8px;
    background: #f8fafc;
    text-align: center;
  }

  .stat .num {
    font-size: 22px;
    font-weight: 900;
    color: #263238;
  }

  .stat .lbl {
    margin-top: 2px;
    font-size: 10px;
    font-weight: 800;
    color: #687789;
    text-transform: uppercase;
  }

  .pity {
    margin-bottom: 16px;
  }

  .pity-top {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 7px;
    color: #4b5d70;
    font-size: 12px;
    font-weight: 700;
  }

  .pity-track {
    height: 12px;
    overflow: hidden;
    border: 2px solid #263238;
    border-radius: 999px;
    background: #e7edf5;
  }

  .pity-fill {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #ffcb05, #ff7b54);
    transition: width 0.3s ease;
  }

  .stage {
    margin-bottom: 16px;
  }

  .pokemon-card {
    position: relative;
    min-height: 355px;
    padding: 16px;
    overflow: hidden;
    border: 4px solid #263238;
    border-radius: 14px;
    background: linear-gradient(180deg, #fff9d6 0%, #ffffff 52%, #eef6ff 100%);
  }

  .pokemon-card::before {
    content: "";
    position: absolute;
    inset: 88px 42px auto;
    height: 170px;
    border-radius: 999px;
    background: radial-gradient(circle, rgba(255, 203, 5, 0.7), rgba(255, 255, 255, 0));
  }

  .card-top {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    z-index: 1;
  }

  .pokemon-name {
    color: #17212b;
    font-size: 24px;
    font-weight: 900;
    text-transform: capitalize;
  }

  .pokemon-id {
    color: #536273;
    font-size: 13px;
    font-weight: 800;
  }

  .rarity {
    padding: 7px 10px;
    border: 2px solid #263238;
    border-radius: 999px;
    background: #ffffff;
    color: #263238;
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
  }

  .art-wrap {
    position: relative;
    display: grid;
    place-items: center;
    height: 210px;
    z-index: 1;
  }

  .pokemon-art {
    max-width: 230px;
    max-height: 205px;
    image-rendering: auto;
    filter: drop-shadow(0 18px 20px rgba(31, 41, 51, 0.2));
  }

  .placeholder {
    color: #8391a3;
    font-size: 17px;
    font-weight: 800;
  }

  .type-row {
    position: relative;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 31px;
    margin-bottom: 12px;
    z-index: 1;
  }

  .type {
    padding: 7px 10px;
    border-radius: 999px;
    background: #263238;
    color: #ffffff;
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
  }

  .detail-grid {
    position: relative;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    z-index: 1;
  }

  .detail {
    padding: 9px 7px;
    border: 2px solid #e0e6ef;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.82);
    text-align: center;
  }

  .detail strong {
    display: block;
    color: #17212b;
    font-size: 16px;
  }

  .detail span {
    color: #687789;
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
  }

  .pokemon-card.rare { background: linear-gradient(180deg, #e4f3ff 0%, #ffffff 52%, #eef6ff 100%); }
  .pokemon-card.epic { background: linear-gradient(180deg, #f2e7ff 0%, #ffffff 52%, #f4efff 100%); }
  .pokemon-card.shiny {
    border-color: #ffcb05;
    background: linear-gradient(180deg, #fff3a9 0%, #ffffff 46%, #fff6d6 100%);
    box-shadow: 0 0 0 4px #2a55a2 inset, 0 18px 42px rgba(255, 203, 5, 0.34);
  }

  .pokemon-card.rare .rarity { background: #dff1ff; color: #155c9c; }
  .pokemon-card.epic .rarity { background: #efe1ff; color: #6d28d9; }
  .pokemon-card.shiny .rarity { background: #ffcb05; color: #17212b; }

  @keyframes reveal {
    0% { transform: translateY(12px) scale(0.96); opacity: 0; }
    70% { transform: translateY(-3px) scale(1.02); opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }

  @keyframes shine {
    0%, 100% { filter: drop-shadow(0 18px 20px rgba(31, 41, 51, 0.2)); }
    50% { filter: drop-shadow(0 0 28px rgba(255, 203, 5, 0.95)); }
  }

  .pokemon-card.reveal { animation: reveal 0.35s ease; }
  .pokemon-card.shiny.reveal .pokemon-art { animation: shine 1.1s ease-in-out 2; }

  .buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .btn {
    min-height: 48px;
    border: 3px solid #263238;
    border-radius: 10px;
    background: #2a75bb;
    color: #ffffff;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    transition: transform 0.08s ease, filter 0.15s ease;
  }

  .btn:hover { filter: brightness(1.08); }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { cursor: wait; filter: grayscale(0.35); opacity: 0.7; }
  .btn.gold { background: #ffcb05; color: #17212b; }

  .status {
    min-height: 20px;
    margin-bottom: 12px;
    color: #596a7d;
    font-size: 12px;
    font-weight: 700;
    text-align: center;
  }

  .hist-lbl {
    margin-bottom: 8px;
    color: #536273;
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
  }

  .history {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 7px;
    min-height: 54px;
  }

  .chip {
    display: grid;
    place-items: center;
    aspect-ratio: 1;
    border: 2px solid #d7dee8;
    border-radius: 8px;
    background: #f8fafc;
  }

  .chip img {
    width: 42px;
    height: 42px;
    object-fit: contain;
  }

  .chip-fallback {
    color: #2a55a2;
    font-size: 10px;
    font-weight: 900;
  }

  .chip.rare { border-color: #2a75bb; background: #e4f3ff; }
  .chip.epic { border-color: #8b5cf6; background: #f2e7ff; }
  .chip.shiny { border-color: #ffcb05; background: #fff3a9; }

  @media (max-width: 430px) {
    .app { padding: 16px; }
    .header { align-items: flex-start; flex-direction: column; }
    .stats { grid-template-columns: 1fr; }
    .pokemon-card { min-height: 335px; }
    .detail-grid { grid-template-columns: 1fr; }
    .buttons { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="brand">
        <h1>Pokemon Gacha</h1>
        <div class="subtitle">Pull Pokemon random langsung dari PokeAPI</div>
      </div>
      <div class="api-badge">PokeAPI Live</div>
    </header>

    <section class="stats" aria-label="Statistik gacha">
      <div class="stat"><div class="num" id="total">0</div><div class="lbl">Total Pull</div></div>
      <div class="stat"><div class="num" id="shinyCount">0</div><div class="lbl">Shiny</div></div>
      <div class="stat"><div class="num" id="lastId">-</div><div class="lbl">Last ID</div></div>
    </section>

    <section class="pity" aria-label="Progress pity shiny">
      <div class="pity-top"><span>Pity ke Shiny</span><span id="pityText">0 / 10</span></div>
      <div class="pity-track"><div class="pity-fill" id="pityFill"></div></div>
    </section>

    <section class="stage">
      <article class="pokemon-card" id="card">
        <div class="card-top">
          <div>
            <div class="pokemon-name" id="pokemonName">Tekan Pull</div>
            <div class="pokemon-id" id="pokemonId">Pokemon random akan muncul</div>
          </div>
          <div class="rarity" id="rarity">Ready</div>
        </div>

        <div class="art-wrap">
          <img class="pokemon-art" id="pokemonArt" alt="" hidden>
          <div class="placeholder" id="placeholder">Poke ball loading...</div>
        </div>

        <div class="type-row" id="types"></div>

        <div class="detail-grid">
          <div class="detail"><strong id="hp">-</strong><span>HP</span></div>
          <div class="detail"><strong id="attack">-</strong><span>Attack</span></div>
          <div class="detail"><strong id="baseExp">-</strong><span>Base EXP</span></div>
        </div>
      </article>
    </section>

    <section class="buttons">
      <button class="btn" id="pull1">Pull 1x</button>
      <button class="btn gold" id="pull10">Pull 10x</button>
    </section>

    <div class="status" id="status">Data Pokemon akan diambil saat tombol ditekan.</div>

    <div class="hist-lbl">Riwayat Terakhir</div>
    <div class="history" id="history"></div>
  </main>

<script>
  const POKEAPI_BASE = "https://pokeapi.co/api/v2/pokemon";
  const MAX_POKEMON_ID = 1025;
  const PITY_LIMIT = 10;

  let pity = 0;
  let total = 0;
  let shinyCount = 0;
  let isPulling = false;

  const card = document.querySelector("#card");
  const pokemonName = document.querySelector("#pokemonName");
  const pokemonId = document.querySelector("#pokemonId");
  const pokemonArt = document.querySelector("#pokemonArt");
  const placeholder = document.querySelector("#placeholder");
  const rarity = document.querySelector("#rarity");
  const types = document.querySelector("#types");
  const hp = document.querySelector("#hp");
  const attack = document.querySelector("#attack");
  const baseExp = document.querySelector("#baseExp");
  const totalEl = document.querySelector("#total");
  const shinyCountEl = document.querySelector("#shinyCount");
  const lastId = document.querySelector("#lastId");
  const pityText = document.querySelector("#pityText");
  const pityFill = document.querySelector("#pityFill");
  const history = document.querySelector("#history");
  const statusEl = document.querySelector("#status");
  const pull1 = document.querySelector("#pull1");
  const pull10 = document.querySelector("#pull10");

  function randomPokemonId() {
    return Math.floor(Math.random() * MAX_POKEMON_ID) + 1;
  }

  function titleCase(text) {
    return text
      .split("-")
      .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
      .join(" ");
  }

  function getStat(pokemon, statName) {
    const found = pokemon.stats.find((item) => item.stat.name === statName);
    return found ? found.base_stat : "-";
  }

  function getArtworkList(pokemon, isShiny) {
    const official = pokemon.sprites.other?.["official-artwork"] || {};
    const home = pokemon.sprites.other?.home || {};
    const showdown = pokemon.sprites.other?.showdown || {};

    const candidates = isShiny
      ? [
          official.front_shiny,
          home.front_shiny,
          pokemon.sprites.front_shiny,
          showdown.front_shiny,
          official.front_default,
          home.front_default,
          pokemon.sprites.front_default
        ]
      : [
          official.front_default,
          home.front_default,
          pokemon.sprites.front_default,
          showdown.front_default
        ];

    return candidates.filter(Boolean);
  }

  function getRarity(isShiny) {
    if (isShiny) return "shiny";

    const chance = Math.random();
    if (chance < 0.10) return "epic";
    if (chance < 0.35) return "rare";
    return "common";
  }

  async function fetchPokemon() {
    const response = await fetch(`${POKEAPI_BASE}/${randomPokemonId()}`);
    if (!response.ok) {
      throw new Error("PokeAPI tidak bisa diakses");
    }
    return response.json();
  }

  async function rollSatu() {
    total += 1;
    pity += 1;

    const isGuaranteedShiny = pity >= PITY_LIMIT;
    const isLuckyShiny = Math.random() < 0.03;
    const isShiny = isGuaranteedShiny || isLuckyShiny;

    if (isShiny) {
      pity = 0;
      shinyCount += 1;
    }

    const pokemon = await fetchPokemon();
    const kelas = getRarity(isShiny);
    const images = getArtworkList(pokemon, isShiny);

    return {
      kelas,
      id: pokemon.id,
      nama: titleCase(pokemon.name),
      images,
      types: pokemon.types.map((item) => item.type.name),
      hp: getStat(pokemon, "hp"),
      attack: getStat(pokemon, "attack"),
      baseExp: pokemon.base_experience || "-",
      shiny: isShiny
    };
  }

  function tampilkanPlaceholderImage() {
    pokemonArt.removeAttribute("src");
    pokemonArt.alt = "";
    pokemonArt.hidden = true;
    placeholder.hidden = false;
    placeholder.textContent = "Gambar Pokemon belum tersedia";
  }

  function pasangGambarUtama(hasil) {
    let imageIndex = 0;

    function cobaGambarBerikutnya() {
      if (imageIndex >= hasil.images.length) {
        tampilkanPlaceholderImage();
        return;
      }

      pokemonArt.src = hasil.images[imageIndex];
      imageIndex += 1;
    }

    if (hasil.images.length === 0) {
      tampilkanPlaceholderImage();
      return;
    }

    pokemonArt.onerror = cobaGambarBerikutnya;
    pokemonArt.onload = () => {
      pokemonArt.hidden = false;
      placeholder.hidden = true;
    };

    pokemonArt.alt = hasil.nama;
    pokemonArt.hidden = true;
    placeholder.hidden = false;
    placeholder.textContent = "Memuat gambar Pokemon...";
    cobaGambarBerikutnya();
  }

  function updateStats(hasil) {
    totalEl.textContent = total;
    shinyCountEl.textContent = shinyCount;
    lastId.textContent = `#${hasil.id}`;
    pityText.textContent = `${pity} / ${PITY_LIMIT}`;
    pityFill.style.width = `${(pity / PITY_LIMIT) * 100}%`;
  }

  function tampilkan(hasil) {
    pokemonName.textContent = hasil.nama;
    pokemonId.textContent = `#${hasil.id}`;
    rarity.textContent = hasil.shiny ? "Shiny SSR" : hasil.kelas;
    pasangGambarUtama(hasil);

    types.innerHTML = "";
    hasil.types.forEach((typeName) => {
      const type = document.createElement("span");
      type.className = "type";
      type.textContent = typeName;
      types.append(type);
    });

    hp.textContent = hasil.hp;
    attack.textContent = hasil.attack;
    baseExp.textContent = hasil.baseExp;

    // Reset class agar animasi reveal tetap jalan di setiap pull.
    card.className = "pokemon-card";
    card.offsetWidth;
    card.className = `pokemon-card ${hasil.kelas} reveal`;

    updateStats(hasil);
  }

  function tambahRiwayat(hasil) {
    const chip = document.createElement("div");

    chip.className = `chip ${hasil.kelas}`;
    chip.title = `${hasil.nama} #${hasil.id}`;

    if (hasil.images.length > 0) {
      const img = document.createElement("img");
      img.src = hasil.images[0];
      img.alt = hasil.nama;
      img.onerror = () => {
        chip.innerHTML = "";
        const fallback = document.createElement("span");
        fallback.className = "chip-fallback";
        fallback.textContent = `#${hasil.id}`;
        chip.append(fallback);
      };
      chip.append(img);
    } else {
      const fallback = document.createElement("span");
      fallback.className = "chip-fallback";
      fallback.textContent = `#${hasil.id}`;
      chip.append(fallback);
    }

    history.prepend(chip);

    while (history.children.length > 12) {
      history.lastElementChild.remove();
    }
  }

  function setLoading(isLoading) {
    isPulling = isLoading;
    pull1.disabled = isLoading;
    pull10.disabled = isLoading;
  }

  async function jalankanPull(jumlahPull) {
    if (isPulling) return;

    setLoading(true);
    statusEl.textContent = `Mengambil ${jumlahPull} Pokemon dari PokeAPI...`;

    try {
      let hasilTerakhir;

      for (let i = 0; i < jumlahPull; i += 1) {
        statusEl.textContent = `Pull ${i + 1}/${jumlahPull}...`;
        hasilTerakhir = await rollSatu();
        tambahRiwayat(hasilTerakhir);
      }

      tampilkan(hasilTerakhir);
      statusEl.textContent = hasilTerakhir.shiny
        ? "Shiny berhasil didapat!"
        : "Pull selesai. Pity naik kalau belum Shiny.";
    } catch (error) {
      statusEl.textContent = `${error.message}. Coba lagi sebentar.`;
    } finally {
      setLoading(false);
    }
  }

  pull1.addEventListener("click", () => jalankanPull(1));
  pull10.addEventListener("click", () => jalankanPull(10));
</script>
</body>
</html>
