<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gacha ETHJKT</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: #f4f4f1;
    color: #222; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .app {
    width: 100%; max-width: 460px; text-align: center;
    background: #fff;
    border: 1px solid #ddd8cf;
    border-radius: 8px; padding: 24px 22px 28px;
    box-shadow: 0 12px 32px rgba(40,34,28,0.12);
  }
  h1 {
    font-size: 26px; letter-spacing: 0; margin-bottom: 4px;
    color: #1f1f1f;
  }
  .subtitle { font-size: 13px; color: #6f675f; margin-bottom: 18px; }

  .stats { display: flex; gap: 10px; margin-bottom: 12px; }
  .stat {
    flex: 1; background: #f8f7f5; border: 1px solid #ebe7df; border-radius: 8px;
    padding: 10px 6px;
  }
  .stat .num { font-size: 22px; font-weight: 700; }
  .stat .lbl { font-size: 11px; color: #7b746c; text-transform: uppercase; letter-spacing: 1px; }

  .pity { margin-bottom: 18px; text-align: left; }
  .pity-top { display: flex; justify-content: space-between; font-size: 12px; color: #625b54; margin-bottom: 6px; }
  .pity-track { height: 10px; background: #eee9e2; border-radius: 6px; overflow: hidden; }
  .pity-fill {
    height: 100%; width: 0%;
    background: #c84b61;
    transition: width 0.35s ease;
  }

  .stage { display: flex; justify-content: center; margin-bottom: 20px; }
  .card {
    width: 230px; height: 310px; border-radius: 8px;
    background: #f8f7f5; border: 2px solid #d9d3cb;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; position: relative; overflow: hidden;
  }
  .card .photo {
    width: 100%; height: 238px; background: #e9e5df;
    display: flex; align-items: center; justify-content: center;
  }
  .card img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .card .name { width: 100%; font-size: 16px; font-weight: 700; padding: 0 12px; color: #222; }
  .card .rar { font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; opacity: .9; padding-bottom: 10px; }
  .status {
    min-height: 18px; margin-top: -10px; margin-bottom: 16px;
    color: #7b746c; font-size: 12px;
  }
  .api-url {
    display: block; max-width: 100%; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; color: #8f5a9d;
  }

  /* warna per rarity */
  .card.common { border-color: #9b958d; }
  .card.common .rar { color: #6f6a64; }
  .card.rare   { border-color: #4c7ea8; }
  .card.rare   .rar { color: #356b96; }
  .card.epic   { border-color: #8f5a9d; }
  .card.epic   .rar { color: #7d468d; }
  .card.ssr    { border-color: #c84b61; box-shadow: 0 8px 24px rgba(200,75,97,.18); }
  .card.ssr    .rar, .card.ssr .name { color: #b0364d; }

  /* animasi reveal */
  @keyframes pop { 0% { transform: scale(.5); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  @keyframes glowpulse { 0%,100%{box-shadow:0 8px 24px rgba(200,75,97,.18)} 50%{box-shadow:0 10px 34px rgba(200,75,97,.35)} }
  .card.reveal { animation: pop .4s ease; }
  .card.ssr.reveal { animation: pop .4s ease, shake .5s ease .4s, glowpulse 1.2s ease-in-out .4s 2; }

  .buttons { display: flex; gap: 12px; margin-bottom: 22px; }
  .btn {
    flex: 1; padding: 14px 0; border: 1px solid #1f1f1f; border-radius: 8px;
    font-size: 15px; font-weight: 800; letter-spacing: 0; cursor: pointer;
    color: #fff; background: #1f1f1f;
    transition: transform .08s ease, filter .15s ease;
  }
  .btn:hover { filter: brightness(1.08); }
  .btn:active { transform: scale(.95); }
  .btn:disabled { opacity: .55; }
  .btn.gold { background: #c84b61; border-color: #c84b61; }

  .hist-lbl { font-size: 11px; color: #7b746c; text-transform: uppercase; letter-spacing: 1px; text-align: left; margin-bottom: 8px; }
  .history { display: flex; flex-wrap: wrap; gap: 6px; min-height: 34px; }
  .chip {
    width: 42px; height: 42px; border-radius: 8px; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background: #f8f7f5; border: 2px solid #d9d3cb;
  }
  .chip img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .chip.rare { border-color: #4c7ea8; }
  .chip.epic { border-color: #8f5a9d; }
  .chip.ssr  { border-color: #c84b61; }
</style>
</head>
<body>
  <div class="app">
    <h1>GACHA ETHJKT</h1>
    <div class="subtitle">tarik hokimu, pamerin ke temen sebelah</div>

    <div class="stats">
      <div class="stat"><div class="num" id="total">0</div><div class="lbl">Total Tarik</div></div>
      <div class="stat"><div class="num" id="ssrCount">0</div><div class="lbl">SSR Didapat</div></div>
    </div>

    <div class="pity">
      <div class="pity-top"><span>Pity ke SSR gratis</span><span id="pityText">0 / 10</span></div>
      <div class="pity-track"><div class="pity-fill" id="pityFill"></div></div>
    </div>

    <div class="stage">
      <div class="card" id="card">
        <div class="photo"><img id="cardImage" alt="Hasil gacha waifu"></div>
        <div class="name" id="cardName">Tekan TARIK</div>
        <div class="rar" id="cardRarity"></div>
      </div>
    </div>
    <div class="status" id="statusText">Siap tarik waifu.</div>

    <div class="buttons">
      <button class="btn" id="tarik1">TARIK 1x</button>
      <button class="btn gold" id="tarik10">TARIK 10x</button>
    </div>

    <div class="hist-lbl">Riwayat Terakhir</div>
    <div class="history" id="history"></div>
  </div>

<script>
  const namaWaifu = {
    ssr: ["Aurora", "Celestia", "Hikari", "Miyuki"],
    epic: ["Akari", "Yuna", "Sakura", "Reina"],
    rare: ["Nana", "Aoi", "Rika", "Mei"],
    common: ["Mika", "Sora", "Hana", "Rin"]
  };

  let pity = 0;
  let total = 0;
  let ssrCount = 0;
  let sedangMenarik = false;

  const card = document.getElementById("card");
  const cardImage = document.getElementById("cardImage");
  const cardName = document.getElementById("cardName");
  const cardRarity = document.getElementById("cardRarity");
  const statusText = document.getElementById("statusText");
  const totalEl = document.getElementById("total");
  const ssrCountEl = document.getElementById("ssrCount");
  const pityText = document.getElementById("pityText");
  const pityFill = document.getElementById("pityFill");
  const historyEl = document.getElementById("history");
  const tarik1 = document.getElementById("tarik1");
  const tarik10 = document.getElementById("tarik10");

  function buatSvgData(teks) {
    const svg = `
      <svg xmlns="http://www.w3.org/2000/svg" width="460" height="620" viewBox="0 0 460 620">
        <rect width="460" height="620" fill="#f1eee9"/>
        <rect x="86" y="86" width="288" height="448" rx="18" fill="#e4ded5" stroke="#d2c8bd" stroke-width="4"/>
        <text x="230" y="295" font-size="28" text-anchor="middle" fill="#625b54" font-family="Arial">${teks}</text>
      </svg>`;

    return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
  }

  const gambarFallback = buatSvgData("Tarik untuk mulai");

  cardImage.src = gambarFallback;
  cardImage.onerror = () => {
    if (cardImage.src !== gambarFallback) {
      cardImage.src = gambarFallback;
    }
  };

  function pilihAcak(arr) {
    const index = Math.floor(Math.random() * arr.length);
    return arr[index];
  }

  async function ambilGambarWaifu() {
    const response = await fetch("https://api.waifu.im/images");

    if (!response.ok) {
      throw new Error("Gagal mengambil gambar waifu");
    }

    const data = await response.json();
    const url = data.url
      || data.images?.[0]?.url
      || data.items?.[0]?.url
      || data[0]?.url
      || data.images?.[0]?.image?.url;

    if (!url) {
      throw new Error("Response API tidak berisi URL gambar");
    }

    return url;
  }

  async function rollSatu() {
    const gambar = await ambilGambarWaifu();

    total += 1;
    pity += 1;

    const acak = Math.random();
    let kelas = "common";

    if (pity >= 10 || acak < 0.03) {
      kelas = "ssr";
      pity = 0;
      ssrCount += 1;
    } else if (acak < 0.10) {
      kelas = "epic";
    } else if (acak < 0.30) {
      kelas = "rare";
    }

    return {
      kelas,
      nama: pilihAcak(namaWaifu[kelas]),
      gambar
    };
  }

  function tampilkan(hasil) {
    cardImage.src = hasil.gambar;
    cardImage.alt = `${hasil.nama} - ${hasil.kelas.toUpperCase()}`;
    cardName.textContent = hasil.nama;
    cardRarity.textContent = hasil.kelas.toUpperCase();
    statusText.innerHTML = `Gambar dari API waifu.im:<span class="api-url">${hasil.gambar}</span>`;

    card.className = "card";
    card.offsetWidth;
    card.className = `card ${hasil.kelas} reveal`;

    totalEl.textContent = total;
    ssrCountEl.textContent = ssrCount;
    pityText.textContent = `${pity} / 10`;
    pityFill.style.width = `${(pity / 10) * 100}%`;
  }

  function tambahRiwayat(hasil) {
    const chip = document.createElement("div");
    chip.className = `chip ${hasil.kelas}`;
    chip.title = `${hasil.nama} (${hasil.kelas.toUpperCase()})`;

    const img = document.createElement("img");
    img.src = hasil.gambar;
    img.alt = hasil.nama;
    chip.appendChild(img);

    historyEl.prepend(chip);

    while (historyEl.children.length > 12) {
      historyEl.lastElementChild.remove();
    }
  }

  function setTombolAktif(aktif) {
    sedangMenarik = !aktif;
    tarik1.disabled = !aktif;
    tarik10.disabled = !aktif;
    tarik1.style.cursor = aktif ? "pointer" : "wait";
    tarik10.style.cursor = aktif ? "pointer" : "wait";
  }

  async function tarikSekali() {
    if (sedangMenarik) return;

    setTombolAktif(false);
    cardName.textContent = "Memuat...";

    try {
      const hasil = await rollSatu();
      tampilkan(hasil);
      tambahRiwayat(hasil);
    } catch (error) {
      cardName.textContent = "Gagal memuat";
      cardRarity.textContent = "";
      statusText.textContent = `Gagal mengambil data dari https://api.waifu.im/images. Detail: ${error.message}`;
    }

    setTombolAktif(true);
  }

  async function tarikSepuluh() {
    if (sedangMenarik) return;

    setTombolAktif(false);

    for (let i = 0; i < 10; i += 1) {
      cardName.textContent = "Memuat...";
      try {
        const hasil = await rollSatu();
        tampilkan(hasil);
        tambahRiwayat(hasil);
      } catch (error) {
        cardName.textContent = "Gagal memuat";
        cardRarity.textContent = "";
        statusText.textContent = `Tarikan dihentikan karena API waifu.im gagal. Detail: ${error.message}`;
        break;
      }

      await new Promise((resolve) => setTimeout(resolve, 180));
    }

    setTombolAktif(true);
  }

  tarik1.addEventListener("click", tarikSekali);
  tarik10.addEventListener("click", tarikSepuluh);
</script>
</body>
</html>
