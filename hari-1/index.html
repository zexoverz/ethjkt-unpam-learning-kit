<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gacha ETHJKT</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at 50% 0%, #1b2140 0%, #0a0d1c 70%);
    color: #eaeaf0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .app {
    width: 100%; max-width: 460px; text-align: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px; padding: 24px 22px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  h1 {
    font-size: 26px; letter-spacing: 1px; margin-bottom: 4px;
    background: linear-gradient(90deg,#ffd86b,#ff7eb3,#7ee8ff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .subtitle { font-size: 12px; color: #8b90b0; margin-bottom: 18px; }

  .stats { display: flex; gap: 10px; margin-bottom: 12px; }
  .stat {
    flex: 1; background: rgba(255,255,255,0.05); border-radius: 12px;
    padding: 10px 6px;
  }
  .stat .num { font-size: 22px; font-weight: 700; }
  .stat .lbl { font-size: 11px; color: #8b90b0; text-transform: uppercase; letter-spacing: 1px; }

  .pity { margin-bottom: 18px; text-align: left; }
  .pity-top { display: flex; justify-content: space-between; font-size: 12px; color: #b9bdd8; margin-bottom: 6px; }
  .pity-track { height: 10px; background: rgba(255,255,255,0.08); border-radius: 6px; overflow: hidden; }
  .pity-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg,#ffd86b,#ffb347);
    transition: width 0.35s ease;
  }

  .stage { display: flex; justify-content: center; margin-bottom: 20px; }
  .card {
    width: 180px; height: 230px; border-radius: 18px;
    background: #171b30; border: 3px solid #2a2f4a;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; position: relative;
  }
  .card .emoji { font-size: 74px; line-height: 1; filter: drop-shadow(0 4px 10px rgba(0,0,0,.5)); }
  .card .name { font-size: 17px; font-weight: 700; padding: 0 8px; }
  .card .rar { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; opacity: .9; }

  /* warna per rarity */
  .card.common { border-color: #6b7280; }
  .card.common .rar { color: #9aa3b2; }
  .card.rare   { border-color: #4da6ff; box-shadow: 0 0 22px rgba(77,166,255,.45); }
  .card.rare   .rar { color: #4da6ff; }
  .card.epic   { border-color: #b06bff; box-shadow: 0 0 26px rgba(176,107,255,.55); }
  .card.epic   .rar { color: #c88bff; }
  .card.ssr    { border-color: #ffd24a; box-shadow: 0 0 40px rgba(255,210,74,.8); }
  .card.ssr    .rar { color: #ffd24a; }
  .card.ssr    .name { color: #ffe89a; }

  /* animasi reveal */
  @keyframes pop { 0% { transform: scale(.5); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  @keyframes glowpulse { 0%,100%{box-shadow:0 0 30px rgba(255,210,74,.7)} 50%{box-shadow:0 0 55px rgba(255,210,74,1)} }
  .card.reveal { animation: pop .4s ease; }
  .card.ssr.reveal { animation: pop .4s ease, shake .5s ease .4s, glowpulse 1.2s ease-in-out .4s 2; }

  .buttons { display: flex; gap: 12px; margin-bottom: 22px; }
  .btn {
    flex: 1; padding: 15px 0; border: none; border-radius: 14px;
    font-size: 16px; font-weight: 800; letter-spacing: 1px; cursor: pointer;
    color: #0a0d1c; background: linear-gradient(180deg,#8fd3ff,#4da6ff);
    transition: transform .08s ease, filter .15s ease;
  }
  .btn:hover { filter: brightness(1.08); }
  .btn:active { transform: scale(.95); }
  .btn.gold { background: linear-gradient(180deg,#ffe58a,#ffb347); }

  .result-panel {
    text-align: left; margin-bottom: 18px; padding: 12px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
  }
  .result-title {
    font-size: 11px; color: #8b90b0; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 8px;
  }
  .result-list { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .result-item {
    min-height: 48px; border-radius: 10px; background: #171b30;
    border: 2px solid #2a2f4a; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 2px;
  }
  .result-item .emoji { font-size: 20px; line-height: 1; }
  .result-item .rarity { font-size: 9px; font-weight: 800; letter-spacing: .5px; }
  .result-item.common .rarity { color: #9aa3b2; }
  .result-item.rare { border-color: #4da6ff; }
  .result-item.rare .rarity { color: #4da6ff; }
  .result-item.epic { border-color: #b06bff; }
  .result-item.epic .rarity { color: #c88bff; }
  .result-item.ssr { border-color: #ffd24a; box-shadow: 0 0 10px rgba(255,210,74,.45); }
  .result-item.ssr .rarity { color: #ffd24a; }

  .hist-lbl { font-size: 11px; color: #8b90b0; text-transform: uppercase; letter-spacing: 1px; text-align: left; margin-bottom: 8px; }
  .history { display: flex; flex-wrap: wrap; gap: 6px; min-height: 34px; }
  .chip {
    font-size: 20px; width: 34px; height: 34px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    background: #171b30; border: 2px solid #2a2f4a;
  }
  .chip.rare { border-color: #4da6ff; }
  .chip.epic { border-color: #b06bff; }
  .chip.ssr  { border-color: #ffd24a; box-shadow: 0 0 10px rgba(255,210,74,.6); }
</style>
</head>
<body>
  <div class="app">
    <h1>GACHA ETHJKT</h1>
    <div class="subtitle">tarik hokimu, pamerin ke temen sebelah</div>

    <div class="stats">
      <div class="stat"><div class="num" id="total">0</div><div class="lbl">Total Tarik</div></div>
      <div class="stat"><div class="num" id="ssrCount">0</div><div class="lbl">SSR Didapat</div></div>
    </div>

    <div class="pity">
      <div class="pity-top"><span>Pity ke SSR gratis</span><span id="pityText">0 / 10</span></div>
      <div class="pity-track"><div class="pity-fill" id="pityFill"></div></div>
    </div>

    <div class="stage">
      <div class="card" id="card">
        <div class="emoji" id="cardEmoji">?</div>
        <div class="name" id="cardName">Tekan TARIK</div>
        <div class="rar" id="cardRarity"></div>
      </div>
    </div>

    <div class="buttons">
      <button class="btn" id="tarik1">PULL 1x</button>
      <button class="btn gold" id="tarik10">PULL 10x</button>
    </div>

    <div class="result-panel">
      <div class="result-title">Hasil Pull Terakhir</div>
      <div class="result-list" id="resultList"></div>
    </div>

    <div class="hist-lbl">Riwayat Terakhir</div>
    <div class="history" id="history"></div>
  </div>

<script>
  const PITY_LIMIT = 10;

  const hadiah = {
    ssr: [
      { n: "Laptop Quantum", e: "💻" },
      { n: "ETHJKT Hoodie", e: "🧥" },
      { n: "Golden Ticket", e: "🎫" }
    ],
    epic: [
      { n: "Keyboard RGB", e: "⌨️" },
      { n: "Sticker Pack", e: "✨" },
      { n: "Mentor Call", e: "📞" }
    ],
    rare: [
      { n: "Kopi Coding", e: "☕" },
      { n: "Gas Fee Voucher", e: "⛽" },
      { n: "Notebook", e: "📓" }
    ],
    common: [
      { n: "Semangat", e: "🔥" },
      { n: "Pensil", e: "✏️" },
      { n: "Air Mineral", e: "🥤" },
      { n: "Permen", e: "🍬" }
    ]
  };

  let pity = 0;
  let total = 0;
  let ssrCount = 0;

  const card = document.getElementById("card");
  const cardEmoji = document.getElementById("cardEmoji");
  const cardName = document.getElementById("cardName");
  const cardRarity = document.getElementById("cardRarity");
  const totalText = document.getElementById("total");
  const ssrCountText = document.getElementById("ssrCount");
  const pityText = document.getElementById("pityText");
  const pityFill = document.getElementById("pityFill");
  const history = document.getElementById("history");
  const resultList = document.getElementById("resultList");

  function pilihAcak(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function rollSatu() {
    total += 1;
    pity += 1;

    const angkaAcak = Math.random();
    let kelas = "common";

    // Pity membuat SSR pasti keluar maksimal setiap 10 pull.
    if (pity >= PITY_LIMIT || angkaAcak < 0.03) {
      kelas = "ssr";
      pity = 0;
      ssrCount += 1;
    } else if (angkaAcak < 0.10) {
      kelas = "epic";
    } else if (angkaAcak < 0.30) {
      kelas = "rare";
    }

    const item = pilihAcak(hadiah[kelas]);
    return { kelas, nama: item.n, emoji: item.e };
  }

  function updateStats() {
    totalText.textContent = total;
    ssrCountText.textContent = ssrCount;
    pityText.textContent = `${pity} / ${PITY_LIMIT}`;
    pityFill.style.width = `${(pity / PITY_LIMIT) * 100}%`;
  }

  function tampilkan(hasil) {
    cardEmoji.textContent = hasil.emoji;
    cardName.textContent = hasil.nama;
    cardRarity.textContent = hasil.kelas.toUpperCase();

    card.className = "card";
    card.offsetWidth;
    card.className = `card ${hasil.kelas} reveal`;

    updateStats();
  }

  function tambahRiwayat(hasil) {
    const chip = document.createElement("div");
    chip.className = `chip ${hasil.kelas}`;
    chip.textContent = hasil.emoji;
    chip.title = `${hasil.nama} (${hasil.kelas.toUpperCase()})`;

    history.prepend(chip);

    while (history.children.length > 12) {
      history.lastElementChild.remove();
    }
  }

  function tampilkanDaftarHasil(hasilPull) {
    resultList.innerHTML = "";

    hasilPull.forEach((hasil) => {
      const item = document.createElement("div");
      item.className = `result-item ${hasil.kelas}`;
      item.title = hasil.nama;

      const emoji = document.createElement("div");
      emoji.className = "emoji";
      emoji.textContent = hasil.emoji;

      const rarity = document.createElement("div");
      rarity.className = "rarity";
      rarity.textContent = hasil.kelas.toUpperCase();

      item.append(emoji, rarity);
      resultList.append(item);
    });
  }

  function pull(jumlah) {
    const hasilPull = [];

    for (let i = 0; i < jumlah; i += 1) {
      const hasil = rollSatu();
      hasilPull.push(hasil);
      tambahRiwayat(hasil);
    }

    tampilkan(hasilPull[hasilPull.length - 1]);
    tampilkanDaftarHasil(hasilPull);
  }

  document.getElementById("tarik1").addEventListener("click", () => pull(1));
  document.getElementById("tarik10").addEventListener("click", () => pull(10));

  updateStats();
</script>
</body>
</html>
