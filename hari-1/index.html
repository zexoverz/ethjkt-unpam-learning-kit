<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokemon Gacha Simulator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at 50% 0%, #1b2140 0%, #0a0d1c 70%);
    color: #eaeaf0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .app {
    width: 100%; max-width: 520px; text-align: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px; padding: 24px 22px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  h1 {
    font-size: 26px; letter-spacing: 1px; margin-bottom: 4px;
    background: linear-gradient(90deg,#ffd86b,#ff7eb3,#7ee8ff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .subtitle { font-size: 12px; color: #8b90b0; margin-bottom: 18px; }

  .stats { display: flex; gap: 10px; margin-bottom: 12px; }
  .stat {
    flex: 1; background: rgba(255,255,255,0.05); border-radius: 12px;
    padding: 10px 6px;
  }
  .stat .num { font-size: 22px; font-weight: 700; }
  .stat .lbl { font-size: 11px; color: #8b90b0; text-transform: uppercase; letter-spacing: 1px; }

  .pity { margin-bottom: 18px; text-align: left; }
  .pity-top { display: flex; justify-content: space-between; font-size: 12px; color: #b9bdd8; margin-bottom: 6px; }
  .pity-track { height: 10px; background: rgba(255,255,255,0.08); border-radius: 6px; overflow: hidden; }
  .pity-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg,#ffd86b,#ffb347);
    transition: width 0.35s ease;
  }

  .stage { display: flex; justify-content: center; margin-bottom: 20px; }
  .card {
    width: 220px; min-height: 300px; border-radius: 18px;
    background: #171b30; border: 3px solid #2a2f4a;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; position: relative; padding: 14px;
  }
  .card .emoji { font-size: 74px; line-height: 1; filter: drop-shadow(0 4px 10px rgba(0,0,0,.5)); }
  .card .sprite {
    width: 150px; height: 150px; object-fit: contain;
    filter: drop-shadow(0 12px 18px rgba(0,0,0,.45));
  }
  .card .name { font-size: 17px; font-weight: 700; padding: 0 8px; }
  .card .rar { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; opacity: .9; }
  .types { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; min-height: 24px; }
  .type {
    font-size: 11px; font-weight: 800; text-transform: uppercase;
    background: rgba(255,255,255,.1); border-radius: 999px; padding: 5px 8px;
  }
  .meta {
    min-height: 34px; font-size: 12px; line-height: 1.35;
    color: #b9bdd8; padding: 0 4px;
  }
  .flavor {
    min-height: 34px; font-size: 11px; line-height: 1.35;
    color: #8b90b0; padding: 0 4px;
  }

  /* warna per rarity */
  .card.common { border-color: #6b7280; }
  .card.common .rar { color: #9aa3b2; }
  .card.rare   { border-color: #4da6ff; box-shadow: 0 0 22px rgba(77,166,255,.45); }
  .card.rare   .rar { color: #4da6ff; }
  .card.epic   { border-color: #b06bff; box-shadow: 0 0 26px rgba(176,107,255,.55); }
  .card.epic   .rar { color: #c88bff; }
  .card.ssr    { border-color: #ffd24a; box-shadow: 0 0 40px rgba(255,210,74,.8); }
  .card.ssr    .rar { color: #ffd24a; }
  .card.ssr    .name { color: #ffe89a; }

  /* animasi reveal */
  @keyframes pop { 0% { transform: scale(.5); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  @keyframes glowpulse { 0%,100%{box-shadow:0 0 30px rgba(255,210,74,.7)} 50%{box-shadow:0 0 55px rgba(255,210,74,1)} }
  .card.reveal { animation: pop .4s ease; }
  .card.ssr.reveal { animation: pop .4s ease, shake .5s ease .4s, glowpulse 1.2s ease-in-out .4s 2; }

  .buttons { display: flex; gap: 12px; margin-bottom: 22px; }
  .btn {
    flex: 1; padding: 15px 0; border: none; border-radius: 14px;
    font-size: 16px; font-weight: 800; letter-spacing: 1px; cursor: pointer;
    color: #0a0d1c; background: linear-gradient(180deg,#8fd3ff,#4da6ff);
    transition: transform .08s ease, filter .15s ease;
  }
  .btn:hover { filter: brightness(1.08); }
  .btn:active { transform: scale(.95); }
  .btn.gold { background: linear-gradient(180deg,#ffe58a,#ffb347); }

  .hist-lbl { font-size: 11px; color: #8b90b0; text-transform: uppercase; letter-spacing: 1px; text-align: left; margin-bottom: 8px; }
  .history { display: flex; flex-wrap: wrap; gap: 6px; min-height: 34px; }
  .chip {
    font-size: 20px; width: 38px; height: 38px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    background: #171b30; border: 2px solid #2a2f4a;
  }
  .chip img { width: 32px; height: 32px; object-fit: contain; }
  .chip.rare { border-color: #4da6ff; }
  .chip.epic { border-color: #b06bff; }
  .chip.ssr  { border-color: #ffd24a; box-shadow: 0 0 10px rgba(255,210,74,.6); }
</style>
</head>
<body>
  <div class="app">
    <h1>POKEMON GACHA</h1>
    <div class="subtitle">tarik Pokemon dari data live PokeAPI</div>

    <div class="stats">
      <div class="stat"><div class="num" id="total">0</div><div class="lbl">Total Tarik</div></div>
      <div class="stat"><div class="num" id="ssrCount">0</div><div class="lbl">SSR Didapat</div></div>
    </div>

    <div class="pity">
      <div class="pity-top"><span>Pity ke SSR gratis</span><span id="pityText">0 / 10</span></div>
      <div class="pity-track"><div class="pity-fill" id="pityFill"></div></div>
    </div>

    <div class="stage">
      <div class="card" id="card">
        <img class="sprite" id="cardImage" alt="" hidden>
        <div class="emoji" id="cardEmoji">?</div>
        <div class="name" id="cardName">Tekan TARIK</div>
        <div class="rar" id="cardRarity"></div>
        <div class="types" id="cardTypes"></div>
        <div class="meta" id="cardMeta"></div>
        <div class="flavor" id="cardFlavor"></div>
      </div>
    </div>

    <div class="buttons">
      <button class="btn" id="tarik1">TARIK 1x</button>
      <button class="btn gold" id="tarik10">TARIK 10x</button>
    </div>

    <div class="hist-lbl">Riwayat Terakhir</div>
    <div class="history" id="history"></div>
  </div>

<script>
  const BATAS_PITY = 10;
  const API_BASE = "https://pokeapi.co/api/v2";

  const pokemonPools = {
    ssr: [144, 145, 146, 150, 151, 243, 244, 245, 249, 250, 251, 382, 383, 384, 385, 386, 483, 484, 487, 493, 643, 644, 646, 716, 717, 718, 719, 720, 721, 888, 889, 890, 891, 892, 893, 894, 895, 896, 897, 898, 905],
    epic: [3, 6, 9, 65, 94, 130, 131, 143, 149, 154, 157, 160, 181, 196, 197, 230, 248, 254, 257, 260, 282, 289, 306, 330, 350, 373, 376, 445, 448, 460, 466, 467, 470, 471, 475, 497, 500, 503, 530, 534, 571, 612, 635, 637, 658, 700, 706, 724, 727, 730, 738, 778, 812, 815, 818, 823, 839, 849, 855, 869, 887],
    rare: [1, 4, 7, 25, 26, 37, 38, 58, 59, 63, 92, 95, 111, 112, 123, 125, 126, 133, 134, 135, 136, 147, 152, 155, 158, 172, 179, 190, 200, 207, 215, 227, 239, 240, 246, 252, 255, 258, 280, 302, 303, 309, 315, 328, 333, 349, 359, 361, 371, 390, 393, 396, 403, 425, 443, 447, 495, 498, 501, 559, 570, 607, 610, 633, 656, 722, 725, 728, 744, 757, 759, 761, 813, 816, 819, 831, 837, 872],
    common: [10, 13, 16, 19, 21, 27, 29, 32, 41, 43, 46, 48, 50, 52, 54, 60, 69, 72, 74, 77, 79, 81, 84, 86, 90, 96, 98, 100, 102, 104, 109, 116, 118, 120, 129, 161, 163, 165, 167, 170, 177, 183, 187, 191, 194, 198, 202, 204, 206, 209, 216, 218, 220, 223, 228, 231, 263, 265, 270, 273, 276, 278, 283, 285, 290, 293, 300, 304, 316, 322, 325, 331, 339, 343, 355, 363, 399, 401, 412, 420, 431, 434, 438, 439, 440, 446, 504, 506, 509, 519, 524, 527, 532, 535, 540, 543, 546, 548, 550, 554, 557, 562, 568, 572, 580, 582, 588, 590, 595, 599, 605, 613, 616, 622, 627, 659, 661, 664, 667, 669, 672, 674, 677, 682, 684, 686, 688, 690, 692, 704, 708, 710, 714, 731, 734, 736, 742, 746, 751, 753, 755, 767, 769, 771, 774, 819, 821, 824, 827, 829, 833, 835, 840, 843, 846, 848, 852, 856, 859, 868, 870, 871, 872]
  };

  const apiCache = new Map();

  let pity = 0;
  let total = 0;
  let ssrCount = 0;

  const elemen = {
    total: document.getElementById("total"),
    ssrCount: document.getElementById("ssrCount"),
    pityText: document.getElementById("pityText"),
    pityFill: document.getElementById("pityFill"),
    card: document.getElementById("card"),
    cardImage: document.getElementById("cardImage"),
    cardEmoji: document.getElementById("cardEmoji"),
    cardName: document.getElementById("cardName"),
    cardRarity: document.getElementById("cardRarity"),
    cardTypes: document.getElementById("cardTypes"),
    cardMeta: document.getElementById("cardMeta"),
    cardFlavor: document.getElementById("cardFlavor"),
    history: document.getElementById("history"),
    tarik1: document.getElementById("tarik1"),
    tarik10: document.getElementById("tarik10")
  };

  function pilihAcak(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function formatNama(nama) {
    return nama
      .split("-")
      .map((kata) => kata.charAt(0).toUpperCase() + kata.slice(1))
      .join(" ");
  }

  async function fetchJson(url) {
    if (apiCache.has(url)) return apiCache.get(url);

    const response = await fetch(url);
    if (!response.ok) {
      throw new Error(`PokeAPI error ${response.status}`);
    }

    const data = await response.json();
    apiCache.set(url, data);
    return data;
  }

  function pilihRarity() {
    total += 1;
    pity += 1;

    const angkaAcak = Math.random();

    if (pity >= BATAS_PITY || angkaAcak < 0.03) {
      pity = 0;
      ssrCount += 1;
      return "ssr";
    }

    if (angkaAcak < 0.10) return "epic";
    if (angkaAcak < 0.30) return "rare";
    return "common";
  }

  function ambilTeksInggris(entries) {
    const entry = entries.find((item) => item.language.name === "en");
    return entry ? entry.flavor_text.replace(/\s+/g, " ") : "";
  }

  function ambilNamaInggris(species, fallback) {
    const entry = species.names.find((item) => item.language.name === "en");
    return entry ? entry.name : formatNama(fallback);
  }

  function ambilUrlGambar(pokemon) {
    const sprites = pokemon.sprites;

    return [
      sprites?.front_default,
      sprites?.other?.home?.front_default,
      sprites?.other?.["official-artwork"]?.front_default,
      `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${pokemon.id}.png`
    ].filter(Boolean);
  }

  async function ambilPokemon(kelas) {
    const id = pilihAcak(pokemonPools[kelas]);
    const pokemon = await fetchJson(`${API_BASE}/pokemon/${id}/`);
    const species = await fetchJson(pokemon.species.url);
    const totalStat = pokemon.stats.reduce((jumlah, item) => jumlah + item.base_stat, 0);

    return {
      kelas,
      id: pokemon.id,
      nama: ambilNamaInggris(species, pokemon.name),
      gambarUrls: ambilUrlGambar(pokemon),
      types: pokemon.types.map((item) => item.type.name),
      totalStat,
      captureRate: species.capture_rate,
      isLegendary: species.is_legendary,
      isMythical: species.is_mythical,
      teks: ambilTeksInggris(species.flavor_text_entries)
    };
  }

  function pasangGambar(img, hasil, onGagal) {
    const urls = hasil.gambarUrls.length ? hasil.gambarUrls : [""];
    let index = 0;

    img.alt = hasil.nama;
    img.onerror = () => {
      index += 1;

      if (index < urls.length) {
        img.src = urls[index];
        return;
      }

      img.onerror = null;
      onGagal?.();
    };
    img.src = urls[index];
  }

  function tampilkan(hasil) {
    pasangGambar(elemen.cardImage, hasil, () => {
      elemen.cardImage.hidden = true;
      elemen.cardEmoji.hidden = false;
      elemen.cardEmoji.textContent = "#";
    });
    elemen.cardImage.hidden = false;
    elemen.cardEmoji.hidden = true;
    elemen.cardName.textContent = hasil.nama;
    elemen.cardRarity.textContent = `${hasil.kelas.toUpperCase()} #${hasil.id}`;
    elemen.cardTypes.innerHTML = hasil.types
      .map((type) => `<span class="type">${type}</span>`)
      .join("");
    elemen.cardMeta.textContent = `BST ${hasil.totalStat} | Catch ${hasil.captureRate}${hasil.isLegendary ? " | Legendary" : ""}${hasil.isMythical ? " | Mythical" : ""}`;
    elemen.cardFlavor.textContent = hasil.teks;

    elemen.card.className = "card";
    void elemen.card.offsetWidth;
    elemen.card.className = `card ${hasil.kelas} reveal`;

    elemen.total.textContent = total;
    elemen.ssrCount.textContent = ssrCount;
    elemen.pityText.textContent = `${pity} / ${BATAS_PITY}`;
    elemen.pityFill.style.width = `${(pity / BATAS_PITY) * 100}%`;
  }

  function tambahRiwayat(hasil) {
    const chip = document.createElement("div");
    const img = document.createElement("img");

    chip.className = `chip ${hasil.kelas}`;
    chip.title = `${hasil.nama} (${hasil.kelas.toUpperCase()})`;
    pasangGambar(img, hasil, () => {
      chip.textContent = `#${hasil.id}`;
    });
    chip.appendChild(img);

    elemen.history.prepend(chip);

    while (elemen.history.children.length > 12) {
      elemen.history.lastElementChild.remove();
    }
  }

  function setLoading(isLoading) {
    elemen.tarik1.disabled = isLoading;
    elemen.tarik10.disabled = isLoading;
    elemen.tarik1.textContent = isLoading ? "LOADING..." : "TARIK 1x";
    elemen.tarik10.textContent = isLoading ? "LOADING..." : "TARIK 10x";
  }

  async function rollSatu() {
    const kelas = pilihRarity();
    return ambilPokemon(kelas);
  }

  async function tarik(jumlah) {
    let hasilTerakhir;

    setLoading(true);

    try {
      for (let i = 0; i < jumlah; i += 1) {
        hasilTerakhir = await rollSatu();
        tambahRiwayat(hasilTerakhir);
      }

      tampilkan(hasilTerakhir);
    } catch (error) {
      elemen.cardName.textContent = "PokeAPI belum bisa diakses";
      elemen.cardRarity.textContent = "COBA LAGI";
      elemen.cardMeta.textContent = error.message;
      elemen.cardFlavor.textContent = "";
    } finally {
      setLoading(false);
    }
  }

  elemen.tarik1.addEventListener("click", () => tarik(1));
  elemen.tarik10.addEventListener("click", () => tarik(10));
</script>
</body>
</html>
