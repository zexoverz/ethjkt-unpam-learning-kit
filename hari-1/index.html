<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gacha ETHJKT</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at 50% 0%, #1b2140 0%, #0a0d1c 70%);
    color: #eaeaf0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .app {
    width: 100%; max-width: 460px; text-align: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px; padding: 24px 22px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  h1 {
    font-size: 26px; letter-spacing: 1px; margin-bottom: 4px;
    background: linear-gradient(90deg,#ffd86b,#ff7eb3,#7ee8ff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .subtitle { font-size: 12px; color: #8b90b0; margin-bottom: 18px; }

  .stats { display: flex; gap: 10px; margin-bottom: 12px; }
  .stat {
    flex: 1; background: rgba(255,255,255,0.05); border-radius: 12px;
    padding: 10px 6px;
  }
  .stat .num { font-size: 22px; font-weight: 700; }
  .stat .lbl { font-size: 11px; color: #8b90b0; text-transform: uppercase; letter-spacing: 1px; }

  .pity { margin-bottom: 18px; text-align: left; }
  .pity-top { display: flex; justify-content: space-between; font-size: 12px; color: #b9bdd8; margin-bottom: 6px; }
  .pity-track { height: 10px; background: rgba(255,255,255,0.08); border-radius: 6px; overflow: hidden; }
  .pity-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg,#ffd86b,#ffb347);
    transition: width 0.35s ease;
  }

  .stage { display: flex; justify-content: center; margin-bottom: 20px; position: relative; }
  .card {
    width: 260px; min-height: 420px; border-radius: 18px;
    background: #171b30; border: 3px solid #2a2f4a;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    gap: 7px; position: relative; padding: 12px 12px 14px; overflow: visible;
  }
  .card .rar { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; opacity: .9; align-self: flex-start; }
  .card .sprite-wrap { width: 140px; height: 140px; display: flex; align-items: center; justify-content: center; }
  .card .sprite { width: 140px; height: 140px; object-fit: contain; filter: drop-shadow(0 6px 12px rgba(0,0,0,.5)); image-rendering: auto; }
  .card .name { font-size: 19px; font-weight: 700; padding: 0 8px; text-align: center; text-transform: capitalize; }
  .card .dex { font-size: 11px; color: #8b90b0; margin-top: -3px; }
  .card .types { display: flex; gap: 6px; margin: 2px 0; }
  .type-badge {
    font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    padding: 3px 9px; border-radius: 999px; color: #0a0d1c;
  }
  .card .stats { width: 100%; display: flex; flex-direction: column; gap: 4px; padding: 0 6px; margin-top: 2px; }
  .stat-row { display: flex; align-items: center; gap: 8px; font-size: 11px; }
  .stat-row .sn { width: 56px; color: #b9bdd8; text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
  .stat-row .sbar { flex: 1; height: 7px; background: rgba(255,255,255,.08); border-radius: 4px; overflow: hidden; }
  .stat-row .sfill { height: 100%; background: linear-gradient(90deg,#4da6ff,#7ee8ff); border-radius: 4px; transition: width .4s ease; }
  .stat-row .sv { width: 26px; text-align: right; font-weight: 700; color: #eaeaf0; }

  /* warna per rarity */
  .card.common { border-color: #6b7280; }
  .card.common .rar { color: #9aa3b2; }
  .card.rare   { border-color: #4da6ff; box-shadow: 0 0 22px rgba(77,166,255,.45); }
  .card.rare   .rar { color: #4da6ff; }
  .card.epic   { border-color: #b06bff; box-shadow: 0 0 26px rgba(176,107,255,.55); }
  .card.epic   .rar { color: #c88bff; }
  .card.ssr    { border-color: #ffd24a; box-shadow: 0 0 40px rgba(255,210,74,.8); }
  .card.ssr    .rar { color: #ffd24a; }
  .card.ssr    .name { color: #ffe89a; }

  /* animasi reveal */
  @keyframes pop { 0% { transform: scale(.5); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  @keyframes glowpulse { 0%,100%{box-shadow:0 0 30px rgba(255,210,74,.7)} 50%{box-shadow:0 0 55px rgba(255,210,74,1)} }
  .card.reveal { animation: pop .4s ease; }
  .card.ssr.reveal { animation: pop .4s ease, shake .5s ease .4s, glowpulse 1.2s ease-in-out .4s 2; }

  /* === type colors === */
  .type-normal{background:#a8a878}.type-fire{background:#f08030}.type-water{background:#6890f0}
  .type-electric{background:#f8d030}.type-grass{background:#78c850}.type-ice{background:#98d8d8}
  .type-fighting{background:#c03028}.type-poison{background:#a040a0}.type-ground{background:#e0c068}
  .type-flying{background:#a890f0}.type-psychic{background:#f85888}.type-bug{background:#a8b820}
  .type-rock{background:#b8a038}.type-ghost{background:#705898}.type-dragon{background:#7038f8}
  .type-dark{background:#705848}.type-steel{background:#b8b8d0}.type-fairy{background:#ee99ac}

  /* === cry + flavor === */
  .cry-btn {
    position: absolute; top: 10px; right: 10px; width: 30px; height: 30px;
    border: none; border-radius: 50%; cursor: pointer; font-size: 14px;
    background: rgba(255,255,255,.1); color: #eaeaf0; display: flex; align-items: center; justify-content: center;
  }
  .cry-btn:hover { background: rgba(255,255,255,.2); }
  .card .flavor { font-size: 11px; color: #b9bdd8; font-style: italic; line-height: 1.45; margin: 4px 4px 2px; padding: 6px 8px; background: rgba(255,255,255,.03); border-radius: 8px; text-align: center; }

  /* === 10x grid === */
  .grid10 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 18px; }
  .mini {
    aspect-ratio: 3/4; border-radius: 10px; background: #171b30; border: 2px solid #2a2f4a;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; padding: 4px;
    position: relative; animation: pop .35s ease backwards;
  }
  .mini img { width: 100%; max-width: 48px; height: 48px; object-fit: contain; }
  .mini .mn { font-size: 8px; text-transform: capitalize; color: #b9bdd8; text-align: center; line-height: 1; }
  .mini.common { border-color: #6b7280; }
  .mini.rare { border-color: #4da6ff; box-shadow: 0 0 8px rgba(77,166,255,.4); }
  .mini.epic { border-color: #b06bff; box-shadow: 0 0 10px rgba(176,107,255,.5); }
  .mini.ssr  { border-color: #ffd24a; box-shadow: 0 0 14px rgba(255,210,74,.7); }

  /* === loading + disabled === */
  .loading {
    position: absolute; inset: 0; background: rgba(10,13,28,.7); border-radius: 18px;
    display: none; align-items: center; justify-content: center; z-index: 5;
  }
  .loading.show { display: flex; }
  .spinner { width: 38px; height: 38px; border: 4px solid rgba(255,255,255,.15); border-top-color: #4da6ff; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn:disabled { opacity: .5; cursor: wait; }

  .buttons { display: flex; gap: 12px; margin-bottom: 22px; }
  .btn {
    flex: 1; padding: 15px 0; border: none; border-radius: 14px;
    font-size: 16px; font-weight: 800; letter-spacing: 1px; cursor: pointer;
    color: #0a0d1c; background: linear-gradient(180deg,#8fd3ff,#4da6ff);
    transition: transform .08s ease, filter .15s ease;
  }
  .btn:hover { filter: brightness(1.08); }
  .btn:active { transform: scale(.95); }
  .btn.gold { background: linear-gradient(180deg,#ffe58a,#ffb347); }

  .hist-lbl { font-size: 11px; color: #8b90b0; text-transform: uppercase; letter-spacing: 1px; text-align: left; margin-bottom: 8px; }
  .history { display: flex; flex-wrap: wrap; gap: 6px; min-height: 34px; }
  .chip {
    font-size: 20px; width: 34px; height: 34px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    background: #171b30; border: 2px solid #2a2f4a;
  }
  .chip.rare { border-color: #4da6ff; }
  .chip.epic { border-color: #b06bff; }
  .chip.ssr  { border-color: #ffd24a; box-shadow: 0 0 10px rgba(255,210,74,.6); }
</style>
</head>
<body>
  <div class="app">
    <h1>GACHA ETHJKT</h1>
    <div class="subtitle">tarik hokimu, pamerin ke temen sebelah</div>

    <div class="stats">
      <div class="stat"><div class="num" id="total">0</div><div class="lbl">Total Tarik</div></div>
      <div class="stat"><div class="num" id="ssrCount">0</div><div class="lbl">SSR Didapat</div></div>
    </div>

    <div class="pity">
      <div class="pity-top"><span>Pity ke SSR gratis</span><span id="pityText">0 / 10</span></div>
      <div class="pity-track"><div class="pity-fill" id="pityFill"></div></div>
    </div>

    <div class="stage">
      <div class="card" id="card">
        <div class="rar" id="cardRarity"></div>
        <button class="cry-btn" id="cryBtn" title="Putar suara">🔊</button>
        <div class="sprite-wrap"><img class="sprite" id="cardSprite" alt="" src=""></div>
        <div class="name" id="cardName">Tekan TARIK</div>
        <div class="dex" id="cardDex"></div>
        <div class="types" id="cardTypes"></div>
        <div class="stats" id="cardStats"></div>
        <div class="flavor" id="flavor">Tekan TARIK untuk memanggil Pokémon pertamamu dari PokeAPI!</div>
        <div class="loading" id="loading"><div class="spinner"></div></div>
      </div>
    </div>

    <div class="buttons">
      <button class="btn" id="tarik1">TARIK 1x</button>
      <button class="btn gold" id="tarik10">TARIK 10x</button>
    </div>

    <div class="grid10" id="grid10"></div>

    <div class="hist-lbl">Riwayat Terakhir</div>
    <div class="history" id="history"></div>
  </div>

<script>
  // ==========================================================
  // MISI HARI 1 - GACHA SIMULATOR (STARTER)
  //
  // Tampilan (HTML + CSS) udah jadi. TUGAS kamu: bikin LOGIKA-nya.
  // JANGAN ketik manual. SURUH Codex yang nulis tiap CHECKPOINT,
  // kamu BACA & VERIFIKASI. Save file -> refresh browser buat lihat.
  //
  // Ikutin urutan checkpoint di README.md. Contoh prompt ada di sana.
  // ==========================================================

  // ==========================================================
  // GACHA ETHJKT × PokeAPI
  // Sekarang tiap roll ngambil Pokémon asli dari https://pokeapi.co
  // Rarity dipetakan dari sifat Pokémon (legendary/base_experience),
  // bukan angka random lagi. Lihat LOG.md buat penjelasan lengkap.
  // ==========================================================

  const MAX_DEX = 1025;     // jumlah Pokémon di PokeAPI (id 1–1025)
  const API = "https://pokeapi.co/api/v2";

  // state gacha
  let pity = 0;
  let total = 0;
  let ssrCount = 0;
  let busy = false;         // true saat ada fetch berjalan (blok tombol)

  // cache in-memory biar gak fetch ulang di sesi yang sama
  const memCache = new Map();

  // ----- CP-A: Fetch dasar (dengan localStorage cache) -----
  function cacheGet(id) {
    const raw = localStorage.getItem("pokeapi:" + id);
    return raw ? JSON.parse(raw) : null;
  }
  function cacheSet(id, data) {
    try { localStorage.setItem("pokeapi:" + id, JSON.stringify(data)); } catch (e) {}
  }

  // ambil 1 Pokémon: data inti + species (flavor text + legendary).
  // Balikin object bersih { id, name, types, stats, sprite, spriteMini, cry, flavor, isLegend, isMythical, baseExp }
  async function ambilPokemon(id) {
    if (memCache.has(id)) return memCache.get(id);
    const cached = cacheGet(id);
    if (cached) { memCache.set(id, cached); return cached; }

    const [p, s] = await Promise.all([
      fetch(API + "/pokemon/" + id).then(r => { if (!r.ok) throw new Error("pokemon " + id); return r.json(); }),
      fetch(API + "/pokemon-species/" + id).then(r => { if (!r.ok) throw new Error("species " + id); return r.json(); })
    ]);

    const flavorEntry = s.flavor_text_entries.find(f => f.language.name === "en")
                   || s.flavor_text_entries[0];
    const flavor = flavorEntry
      ? flavorEntry.flavor_text.replace(/[\n\f\r]/g, " ").replace(/\s+/g, " ").trim()
      : "";

    const data = {
      id: p.id,
      name: p.name,
      types: p.types.map(t => t.type.name),
      stats: p.stats.map(st => ({ name: st.stat.name, base: st.base_stat })),
      sprite:        p.sprites.other["official-artwork"].front_default || p.sprites.front_default,
      spriteMini:    p.sprites.front_default,
      cry:           p.cries.latest,
      flavor:        flavor,
      isLegend:      s.is_legendary,
      isMythical:    s.is_mythical,
      baseExp:       p.base_experience || 0
    };

    memCache.set(id, data);
    cacheSet(id, data);
    return data;
  }

  // ----- CP-B: Rarity dari data Pokémon asli -----
  function hitungRarity(poke) {
    if (poke.isLegend || poke.isMythical) return "ssr";
    if (poke.baseExp >= 200)               return "epic";
    if (poke.baseExp >= 100)               return "rare";
    return "common";
  }

  // ----- CP-B + pity: logika tarikan -----
  // SSR paksa tiap 10 tarikan (pity). Selain itu, rarity mengikuti data Pokémon.
  // Karena Pokémon langka itu langka, kita pakai base rate kecil + pity guarantee.
  async function rollSatu() {
    total++;
    pity++;
    const forcedSSR = pity >= 10;

    // cari Pokémon yang rarity-nya cocok dengan pity/rate
    let poke, kelas, attempts = 0;
    do {
      poke = await ambilPokemon(1 + Math.floor(Math.random() * MAX_DEX));
      kelas = hitungRarity(poke);
      attempts++;
      // forcedSSR -> butuh legendary/mythical; kalau gak dapet dalam 8 percobaan,
      // ambil apa adanya (rarity tertinggi yang kepegang) biar gak loop selamanya.
      if (forcedSSR && kelas !== "ssr" && attempts < 8) continue;
      break;
    } while (true);

    if (kelas === "ssr") { pity = 0; ssrCount++; }
    return { kelas, poke };
  }

  // ----- CP-C/D: Tampilkan kartu -----
  const cardEl     = document.getElementById("card");
  const cardSprite = document.getElementById("cardSprite");
  const cardName   = document.getElementById("cardName");
  const cardDex    = document.getElementById("cardDex");
  const cardRarity = document.getElementById("cardRarity");
  const cardTypes  = document.getElementById("cardTypes");
  const cardStats  = document.getElementById("cardStats");
  const flavorEl   = document.getElementById("flavor");
  const totalEl    = document.getElementById("total");
  const ssrCountEl = document.getElementById("ssrCount");
  const pityTextEl = document.getElementById("pityText");
  const pityFillEl = document.getElementById("pityFill");
  const loadingEl  = document.getElementById("loading");
  const cryBtn     = document.getElementById("cryBtn");
  const grid10El   = document.getElementById("grid10");
  let lastCry = null;

  function tampilkan(hasil) {
    const p = hasil.poke;
    cardSprite.src = p.sprite;
    cardSprite.alt = p.name;
    cardName.textContent = p.name;
    cardDex.textContent  = "#" + String(p.id).padStart(4, "0");
    cardRarity.textContent = hasil.kelas.toUpperCase();

    // tipe
    cardTypes.innerHTML = "";
    p.types.forEach(t => {
      const b = document.createElement("span");
      b.className = "type-badge type-" + t;
      b.textContent = t;
      cardTypes.appendChild(b);
    });

    // stats bar (base stat maks ~255)
    cardStats.innerHTML = "";
    p.stats.forEach(st => {
      const row = document.createElement("div");
      row.className = "stat-row";
      row.innerHTML =
        '<span class="sn">' + st.name.replace("special-", "sp-") + '</span>' +
        '<span class="sbar"><span class="sfill" style="width:0%"></span></span>' +
        '<span class="sv">' + st.base + '</span>';
      cardStats.appendChild(row);
      // trigger animasi bar di frame berikutnya
      requestAnimationFrame(() => {
        row.querySelector(".sfill").style.width = Math.min(100, st.base / 255 * 100) + "%";
      });
    });

    // flavor text
    flavorEl.textContent = p.flavor || "—";

    // cry
    lastCry = p.cry;

    // reset + pasang animasi reveal
    cardEl.className = "card";
    void cardEl.offsetWidth;
    cardEl.className = "card " + hasil.kelas + " reveal";

    // update statistik
    totalEl.textContent    = total;
    ssrCountEl.textContent = ssrCount;
    pityTextEl.textContent = pity + " / 10";
    pityFillEl.style.width = (pity / 10 * 100) + "%";

    // SSR -> bunyikan cry otomatis
    if (hasil.kelas === "ssr") mainkanCry();
  }

  // ----- CP-E: Suara -----
  function mainkanCry() {
    if (!lastCry) return;
    const audio = new Audio(lastCry);
    audio.volume = 0.5;
    audio.play().catch(() => {});  // abaikan kalau browser block autoplay
  }
  cryBtn.addEventListener("click", mainkanCry);

  // ----- CP-F: grid 10x -----
  function tampilkanGrid(hasilList) {
    grid10El.innerHTML = "";
    hasilList.forEach((h, i) => {
      const m = document.createElement("div");
      m.className = "mini " + h.kelas;
      m.style.animationDelay = (i * 60) + "ms";
      m.innerHTML =
        '<img src="' + h.poke.spriteMini + '" alt="' + h.poke.name + '">' +
        '<div class="mn">' + h.poke.name + '</div>';
      grid10El.appendChild(m);
    });
  }

  // ----- CP-G: tombol + loading state -----
  function setBusy(state) {
    busy = state;
    document.getElementById("tarik1").disabled  = state;
    document.getElementById("tarik10").disabled = state;
    loadingEl.classList.toggle("show", state);
  }

  async function tarik1x() {
    if (busy) return;
    setBusy(true);
    try {
      const hasil = await rollSatu();
      tampilkan(hasil);
      tambahRiwayat(hasil);
    } catch (e) {
      flavorEl.textContent = "Gagal ambil data Pokémon. Coba lagi. (" + e.message + ")";
    } finally {
      setBusy(false);
    }
  }

  async function tarik10x() {
    if (busy) return;
    setBusy(true);
    grid10El.innerHTML = "";
    try {
      const hasilList = [];
      for (let i = 0; i < 10; i++) {
        const h = await rollSatu();
        hasilList.push(h);
        tambahRiwayat(h);
      }
      tampilkanGrid(hasilList);
      tampilkan(hasilList[hasilList.length - 1]); // kartu besar = hasil terakhir
    } catch (e) {
      flavorEl.textContent = "Gagal ambil data Pokémon. Coba lagi. (" + e.message + ")";
    } finally {
      setBusy(false);
    }
  }

  // ----- Riwayat (chip pake sprite mini, bukan emoji) -----
  const historyEl = document.getElementById("history");
  function tambahRiwayat(hasil) {
    const chip = document.createElement("div");
    chip.className = "chip " + hasil.kelas;
    chip.title = hasil.poke.name + " (#" + hasil.poke.id + ")";
    chip.innerHTML = '<img src="' + hasil.poke.spriteMini + '" alt="' + hasil.poke.name + '" style="width:24px;height:24px;object-fit:contain;">';
    historyEl.insertBefore(chip, historyEl.firstChild);
    while (historyEl.children.length > 12) historyEl.removeChild(historyEl.lastChild);
  }

  document.getElementById("tarik1").addEventListener("click", tarik1x);
  document.getElementById("tarik10").addEventListener("click", tarik10x);

  // >> Buka Codex, kerjain checkpoint SATU PER SATU. Baca hasilnya.
  // >> Kamu PILOT-nya, bukan penonton.
</script>
</body>
</html>
